<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Breakout Ultra</title>
    <style>
        :root {
            --bg-color: #050508;
            --neon-cyan: #00f2ff;
            --neon-pink: #ff00ea;
            --neon-yellow: #fff200;
        }
        body {
            margin: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }
        #game-container { position: relative; width: 100%; max-width: 800px; }
        canvas {
            display: block;
            background: #000;
            cursor: none;
            margin: 0 auto;
        }
        .ui-overlay {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            pointer-events: none;
            padding: 0 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 10;
        }
        #screen-msg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 20;
        }
        .title { font-size: 48px; color: var(--neon-cyan); margin-bottom: 20px; text-shadow: 0 0 20px var(--neon-cyan); }
        
        .char-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            pointer-events: auto;
        }
        .char-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid #333;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            width: 120px;
        }
        .char-card:hover { border-color: var(--neon-cyan); background: rgba(0,242,255,0.1); }
        .char-card.selected { border-color: var(--neon-cyan); background: rgba(0,242,255,0.2); transform: scale(1.05); }
        .char-name { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .char-stat { font-size: 11px; color: #aaa; }
        
        #start-btn {
            pointer-events: auto;
            background: var(--neon-cyan);
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        #start-btn:active { transform: scale(0.95); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="canvas"></canvas>
    <div class="ui-overlay">
        <div id="score">0000</div>
        <div id="lives">LIVES: 3</div>
    </div>
    
    <div id="screen-msg">
        <div class="title">NEON BREAKOUT</div>
        <div style="margin-bottom: 10px; color: #888;">CHOOSE YOUR PADDLE</div>
        
        <div class="char-selector">
            <div class="char-card selected" onclick="selectChar(0)" id="char-0">
                <div class="char-name">STRIKER</div>
                <div class="char-stat">Standard Balance</div>
                <div class="char-stat">W: 110 | S: 7</div>
            </div>
            <div class="char-card" onclick="selectChar(1)" id="char-1">
                <div class="char-name">TITAN</div>
                <div class="char-stat">Wide & Slow</div>
                <div class="char-stat">W: 160 | S: 5</div>
            </div>
            <div class="char-card" onclick="selectChar(2)" id="char-2">
                <div class="char-name">WISP</div>
                <div class="char-stat">Small & Fast</div>
                <div class="char-stat">W: 70 | S: 10</div>
            </div>
        </div>

        <button id="start-btn">LAUNCH GAME</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const screenMsg = document.getElementById('screen-msg');
    const startBtn = document.getElementById('start-btn');

    // Characters Config
    const CHARACTERS = [
        { name: 'STRIKER', width: 110, speed: 7, color: '#00f2ff' },
        { name: 'TITAN', width: 160, speed: 5, color: '#ff00ea' },
        { name: 'WISP', width: 70, speed: 10, color: '#fff200' }
    ];
    let selectedCharIndex = 0;

    // Game Config
    const BRICK_ROWS = 7;
    const BRICK_COLS = 10;
    const COLORS = ['#FF0055', '#FF00AA', '#AA00FF', '#0022FF', '#0099FF', '#00FFCC', '#00FF66'];
    const brickCache = {};

    // State
    let score = 0;
    let lives = 3;
    let running = false;
    let shakeAmount = 0;
    let bricks = [];
    
    const paddle = { w: 110, h: 14, x: 0, y: 0, speed: 7, color: '#00f2ff' };
    const ball = { x: 0, y: 0, radius: 7, dx: 0, dy: 0, speed: 7 };

    function init() {
        canvas.width = Math.min(window.innerWidth, 800);
        canvas.height = Math.min(window.innerHeight, 600);
        paddle.y = canvas.height - 40;
        
        preRenderBricks();
        resetBricks();
        resetBall();
        gameLoop();
    }

    function selectChar(index) {
        selectedCharIndex = index;
        document.querySelectorAll('.char-card').forEach((card, i) => {
            card.classList.toggle('selected', i === index);
        });
        
        // Apply character stats
        const char = CHARACTERS[index];
        paddle.w = char.width;
        paddle.speed = char.speed;
        paddle.color = char.color;
        ball.speed = char.speed; // Scaling ball speed with paddle speed for challenge
    }

    function preRenderBricks() {
        const padding = 8;
        const brickW = (canvas.width - (BRICK_COLS + 1) * padding) / BRICK_COLS;
        const brickH = 20;

        COLORS.forEach(color => {
            const cache = document.createElement('canvas');
            cache.width = brickW;
            cache.height = brickH;
            const cctx = cache.getContext('2d');
            cctx.fillStyle = color;
            cctx.fillRect(0, 0, brickW, brickH);
            cctx.fillStyle = 'rgba(255,255,255,0.3)';
            cctx.fillRect(0, 0, brickW, 2);
            cctx.fillStyle = 'rgba(0,0,0,0.3)';
            cctx.fillRect(0, brickH-2, brickW, 2);
            brickCache[color] = { img: cache, w: brickW, h: brickH };
        });
    }

    function resetBricks() {
        bricks = [];
        const padding = 8;
        const marginTop = 70;
        const brickW = (canvas.width - (BRICK_COLS + 1) * padding) / BRICK_COLS;
        const brickH = 20;

        for (let r = 0; r < BRICK_ROWS; r++) {
            for (let c = 0; c < BRICK_COLS; c++) {
                bricks.push({
                    x: padding + c * (brickW + padding),
                    y: marginTop + r * (brickH + padding),
                    color: COLORS[r],
                    active: true
                });
            }
        }
    }

    function resetBall() {
        running = false;
        ball.x = paddle.x + paddle.w / 2;
        ball.y = paddle.y - ball.radius - 1;
        screenMsg.classList.remove('hidden');
    }

    function launch() {
        if (lives <= 0) { 
            lives = 3; 
            score = 0; 
            scoreEl.innerText = "0000";
            livesEl.innerText = "LIVES: 3";
            resetBricks(); 
        }
        if (!running) {
            running = true;
            ball.dx = (Math.random() - 0.5) * ball.speed;
            ball.dy = -ball.speed;
            screenMsg.classList.add('hidden');
        }
    }

    function update() {
        if (running) {
            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.dx *= -1;
                shakeAmount = 4;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy *= -1;
                shakeAmount = 2;
            }

            if (ball.y + ball.radius > paddle.y && ball.dy > 0 &&
                ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                let hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
                ball.dx = hit * ball.speed;
                ball.dy = -Math.sqrt(Math.max(2, ball.speed**2 - ball.dx**2));
                shakeAmount = 3;
            }

            for (let i = 0; i < bricks.length; i++) {
                const b = bricks[i];
                if (!b.active) continue;
                
                if (ball.x + ball.radius > b.x && ball.x - ball.radius < b.x + brickCache[b.color].w &&
                    ball.y + ball.radius > b.y && ball.y - ball.radius < b.y + brickCache[b.color].h) {
                    
                    b.active = false;
                    ball.dy *= -1;
                    score += 10;
                    scoreEl.innerText = score.toString().padStart(4, '0');
                    shakeAmount = 6;
                    break; 
                }
            }

            if (ball.y > canvas.height) {
                lives--;
                livesEl.innerText = `LIVES: ${lives}`;
                if (lives <= 0) {
                    document.querySelector('.title').innerText = "GAME OVER";
                    startBtn.innerText = "RETRY";
                }
                resetBall();
            }
        } else {
            ball.x = paddle.x + paddle.w / 2;
        }
        
        if (shakeAmount > 0) shakeAmount *= 0.85;
    }

    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        if (shakeAmount > 0.5) {
            ctx.translate((Math.random()-0.5)*shakeAmount, (Math.random()-0.5)*shakeAmount);
        }

        bricks.forEach(b => {
            if (b.active) {
                ctx.drawImage(brickCache[b.color].img, b.x, b.y);
            }
        });

        // Paddle with Character Color
        ctx.fillStyle = paddle.color;
        ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
        // Highlight on paddle
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillRect(paddle.x, paddle.y, paddle.w, 3);
        
        // Ball
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // Controls
    function handleMove(clientX) {
        const rect = canvas.getBoundingClientRect();
        paddle.x = (clientX - rect.left) - paddle.w / 2;
        paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
    }

    window.addEventListener('mousemove', e => handleMove(e.clientX));
    canvas.addEventListener('touchmove', e => {
        handleMove(e.touches[0].clientX);
        e.preventDefault();
    }, { passive: false });

    startBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        launch();
    });

    // Handle Space to launch
    window.addEventListener('keydown', e => {
        if (e.code === 'Space' && !running) launch();
    });

    init();
</script>
</body>
</html>
