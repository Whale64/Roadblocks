<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint Stuff</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --m3-surface: #f3f3f8;
            --m3-surface-container: #eeeeee;
            --m3-primary: #0061a4;
            --m3-secondary-container: #d1e4ff;
            --m3-outline: #74777f;
        }

        body {
            margin: 0;
            background: var(--m3-surface);
            font-family: 'Google Sans', sans-serif;
            display: flex;
            height: 100vh; /* Lock height to viewport */
            overflow: hidden;
        }

        /* FIXED: Added max-height and overflow-y for scrollability */
        .side-rail {
            width: 340px;
            background: var(--m3-surface-container);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 2px 0 12px rgba(0,0,0,0.05);
            z-index: 10;
            height: 100vh;
            overflow-y: auto; /* Enables scrolling for the UI panel */
            box-sizing: border-box;
        }

        h1 { font-size: 24px; margin: 0 0 10px 0; color: var(--m3-primary); font-weight: 500; }
        h2 { font-size: 11px; color: var(--m3-outline); text-transform: uppercase; letter-spacing: 1.2px; margin: 0 0 12px 0; }

        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .tool-card {
            background: white;
            border: none;
            padding: 12px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tool-card.active { background: var(--m3-secondary-container); transform: scale(0.98); }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }

        .swatch {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.1s;
        }

        .swatch.active { border-color: var(--m3-primary); outline: 2px solid white; }

        .canvas-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #e1e2e9;
        }

        canvas {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            cursor: crosshair;
            touch-action: none;
        }

        .history-controls { display: flex; gap: 12px; margin-bottom: 5px; }
        
        .btn-fab {
            flex: 1;
            height: 48px;
            border-radius: 16px;
            border: 1px solid var(--m3-outline);
            background: white;
            cursor: pointer;
            font-weight: 500;
        }

        .action-bar { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn-primary { background: var(--m3-primary); color: white; border: none; padding: 16px; border-radius: 100px; cursor: pointer; font-size: 15px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="side-rail">
        <h1>Paint Stuff</h1>

        <div>
            <h2>History</h2>
            <div class="history-controls">
                <button class="btn-fab" onclick="undo()">Undo</button>
                <button class="btn-fab" onclick="redo()">Redo</button>
            </div>
        </div>

        <div>
            <h2>Tools</h2>
            <div class="tool-grid">
                <button class="tool-card active" onclick="setMode('brush')">🖌️ Brush</button>
                <button class="tool-card" onclick="setMode('fill')">🪣 Fill</button>
                <button class="tool-card" onclick="setMode('eraser')">🧹 Eraser</button>
                <button class="tool-card" onclick="setMode('airbrush')">☁️ Airbrush</button>
            </div>
        </div>

        <div>
            <h2>Brush Size</h2>
            <input type="range" id="brushSize" min="1" max="100" value="12" style="width: 100%; accent-color: var(--m3-primary);">
        </div>

        <div>
            <h2>Material Palette</h2>
            <div class="color-grid" id="colorGrid"></div>
            <h2 style="margin-top:20px;">Custom Color</h2>
            <input type="color" id="customColor" style="width:100%; height:48px; border:none; border-radius:12px; cursor:pointer; background:white; padding:4px;">
        </div>

        <div class="action-bar">
            <button class="btn-primary" onclick="download()">Export PNG</button>
            <button class="btn-fab" onclick="clearCanvas()" style="border:none; background:#ffdad6; color:#410002;">Reset All</button>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="paintCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const colorGrid = document.getElementById('colorGrid');
        
        let isDrawing = false;
        let mode = 'brush';
        let currentColor = '#000000';
        let history = [];
        let historyStep = -1;

        const palette = [
            '#000000', '#424242', '#757575', '#FFFFFF', '#D32F2F', '#F44336',
            '#C2185B', '#E91E63', '#7B1FA2', '#9C27B0', '#303F9F', '#3F51B5',
            '#1976D2', '#2196F3', '#00796B', '#009688', '#388E3C', '#4CAF50',
            '#FBC02D', '#FFEB3B', '#FFA000', '#FF9800', '#E64A19', '#FF5722',
            '#5D4037', '#795548', '#455A64', '#607D8B', '#00BCD4', '#8BC34A'
        ];

        function init() {
            // Responsive canvas sizing
            canvas.width = canvas.parentElement.clientWidth - 40;
            canvas.height = canvas.parentElement.clientHeight - 40;
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveState();

            palette.forEach(c => {
                const s = document.createElement('div');
                s.className = 'swatch';
                s.style.background = c;
                if(c === '#000000') s.classList.add('active');
                s.onclick = () => {
                    currentColor = c;
                    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
                    s.classList.add('active');
                };
                colorGrid.appendChild(s);
            });
        }

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.tool-card').forEach(c => {
                c.classList.toggle('active', c.innerText.toLowerCase().includes(m));
            });
        }

        function saveState() {
            if (historyStep < history.length - 1) history = history.slice(0, historyStep + 1);
            history.push(canvas.toDataURL());
            historyStep++;
            if (history.length > 30) { history.shift(); historyStep--; }
        }

        function undo() {
            if (historyStep > 0) {
                historyStep--;
                loadHistoryState();
            }
        }

        function redo() {
            if (historyStep < history.length - 1) {
                historyStep++;
                loadHistoryState();
            }
        }

        function loadHistoryState() {
            let img = new Image();
            img.src = history[historyStep];
            img.onload = () => { 
                ctx.clearRect(0,0,canvas.width,canvas.height); 
                ctx.drawImage(img, 0, 0); 
            };
        }

        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const startPos = (startY * canvas.width + startX) * 4;
            
            const startR = data[startPos], startG = data[startPos+1], startB = data[startPos+2];
            const fillRGB = hexToRgb(fillColor);
            
            if (startR === fillRGB.r && startG === fillRGB.g && startB === fillRGB.b) return;

            const stack = [[startX, startY]];
            while (stack.length) {
                const [x, y] = stack.pop();
                const pos = (y * canvas.width + x) * 4;

                if (data[pos] === startR && data[pos+1] === startG && data[pos+2] === startB) {
                    data[pos] = fillRGB.r; data[pos+1] = fillRGB.g; data[pos+2] = fillRGB.b; data[pos+3] = 255;
                    if (x > 0) stack.push([x - 1, y]);
                    if (x < canvas.width - 1) stack.push([x + 1, y]);
                    if (y > 0) stack.push([x, y - 1]);
                    if (y < canvas.height - 1) stack.push([x, y + 1]);
                }
            }
            ctx.putImageData(imageData, 0, 0);
            saveState();
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.round(e.clientX - rect.left);
            const y = Math.round(e.clientY - rect.top);

            if (mode === 'fill') {
                floodFill(x, y, currentColor);
            } else {
                isDrawing = true;
                ctx.beginPath();
                ctx.moveTo(x, y);
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineWidth = document.getElementById('brushSize').value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.globalAlpha = mode === 'airbrush' ? 0.1 : 1.0;
            ctx.strokeStyle = mode === 'eraser' ? 'white' : currentColor;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        });

        window.addEventListener('pointerup', () => { if(isDrawing) { isDrawing = false; saveState(); } });
        document.getElementById('customColor').oninput = (e) => currentColor = e.target.value;
        function clearCanvas() { ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height); saveState(); }
        function download() { const l = document.createElement('a'); l.download='paint-stuff.png'; l.href=canvas.toDataURL(); l.click(); }

        window.onload = init;
    </script>
</body>
</html>
