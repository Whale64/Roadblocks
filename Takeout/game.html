<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAKEOUT - The Invisible Knockout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            cursor: crosshair;
        }
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        .stats {
            font-size: 24px;
            font-weight: bold;
            color: #fbbf24;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #menu, #game-over {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            padding: 2.5rem;
            border-radius: 1rem;
            text-align: center;
            border: 2px solid #fbbf24;
            backdrop-filter: blur(15px);
            z-index: 10;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.2);
        }
        #game-over {
            border-color: #ef4444;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
        }
        .btn {
            background: #fbbf24;
            color: #000;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            display: inline-block;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.4);
        }
        .btn:active { transform: translateY(0); }
        .retry-btn {
            background: #ef4444;
            color: white;
        }
        .retry-btn:hover {
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-overlay">
        <div class="stats">SCORE: <span id="scoreVal">0</span></div>
        <div class="stats text-sm opacity-70">WAVE: <span id="waveVal">1</span></div>
    </div>

    <!-- Main Menu -->
    <div id="menu">
        <h1 class="text-5xl font-black text-amber-400 mb-2 italic">TAKEOUT</h1>
        <p class="mb-6 text-gray-300">The critics are invisible. Watch for the ripples.<br>Shoot them before they reach you.</p>
        <div class="text-left bg-black/50 border border-white/10 p-4 rounded-lg mb-6 text-sm">
            <p class="mb-1">⌨️ <span class="text-amber-400 font-bold">WASD</span> - Move Chef</p>
            <p>🖱️ <span class="text-amber-400 font-bold">CLICK</span> - Aim & Shoot</p>
        </div>
        <div class="btn" onclick="startGame()">START SERVICE</div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over" class="hidden">
        <h2 class="text-6xl font-black text-red-500 mb-4 uppercase italic">YOU LOSE</h2>
        <div class="bg-red-500/10 py-4 px-8 rounded-lg mb-6 border border-red-500/20">
            <p id="finalScore" class="text-2xl font-bold text-white tracking-widest">SCORE: 0</p>
            <p id="finalWave" class="text-sm text-red-400 mt-1 uppercase">Survived Wave 1</p>
        </div>
        <div class="btn retry-btn" onclick="startGame()">TRY AGAIN</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('scoreVal');
    const waveVal = document.getElementById('waveVal');
    const finalScore = document.getElementById('finalScore');
    const finalWave = document.getElementById('finalWave');
    const menu = document.getElementById('menu');
    const gameOverScreen = document.getElementById('game-over');

    let score = 0;
    let wave = 1;
    let gameActive = false;
    let player;
    let enemies = [];
    let projectiles = [];
    let particles = [];
    let keys = {};
    let mouse = { x: 0, y: 0 };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    window.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
    window.addEventListener('mousedown', shoot);

    class Player {
        constructor() {
            this.x = canvas.width / 2;
            this.y = canvas.height / 2;
            this.radius = 18;
            this.speed = 4.5;
            this.color = '#fbbf24';
        }

        update() {
            if (keys['KeyW'] || keys['ArrowUp']) this.y -= this.speed;
            if (keys['KeyS'] || keys['ArrowDown']) this.y += this.speed;
            if (keys['KeyA'] || keys['ArrowLeft']) this.x -= this.speed;
            if (keys['KeyD'] || keys['ArrowRight']) this.x += this.speed;

            this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
            this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
        }

        draw() {
            const angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(angle);
            
            // Aim line
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(251, 191, 36, 0.15)';
            ctx.setLineDash([5, 15]);
            ctx.moveTo(25, 0);
            ctx.lineTo(150, 0);
            ctx.stroke();
            
            // Player shadow
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 20;
            ctx.shadowColor = this.color;
            ctx.fill();
            
            // Chef detail
            ctx.fillStyle = '#fff';
            ctx.fillRect(-6, -22, 12, 12);
            ctx.restore();
        }
    }

    class Enemy {
        constructor() {
            const side = Math.floor(Math.random() * 4);
            if (side === 0) { this.x = -50; this.y = Math.random() * canvas.height; }
            else if (side === 1) { this.x = canvas.width + 50; this.y = Math.random() * canvas.height; }
            else if (side === 2) { this.y = -50; this.x = Math.random() * canvas.width; }
            else { this.y = canvas.height + 50; this.x = Math.random() * canvas.width; }

            this.radius = 14;
            this.speed = 1.2 + (wave * 0.25);
            this.lastRipple = 0;
        }

        update() {
            const angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(angle) * this.speed;
            this.y += Math.sin(angle) * this.speed;

            if (Date.now() - this.lastRipple > 700) {
                createRipple(this.x, this.y);
                this.lastRipple = Date.now();
            }

            const dist = Math.hypot(this.x - player.x, this.y - player.y);
            if (dist < this.radius + player.radius) {
                endGame();
            }
        }
    }

    class Projectile {
        constructor(x, y, targetX, targetY) {
            this.x = x;
            this.y = y;
            const angle = Math.atan2(targetY - y, targetX - x);
            this.vx = Math.cos(angle) * 14;
            this.vy = Math.sin(angle) * 14;
            this.radius = 5;
            this.life = 120;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life--;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#fff';
            ctx.fill();
        }
    }

    class Particle {
        constructor(x, y, color, speedScale = 1) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.vx = (Math.random() - 0.5) * 12 * speedScale;
            this.vy = (Math.random() - 0.5) * 12 * speedScale;
            this.alpha = 1;
            this.decay = Math.random() * 0.02 + 0.01;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= this.decay;
        }

        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function createRipple(x, y) {
        particles.push({
            x, y,
            radius: 2,
            maxRadius: 35,
            alpha: 0.6,
            update() {
                this.radius += 0.8;
                this.alpha -= 0.015;
            },
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        });
    }

    function shoot() {
        if (!gameActive) return;
        projectiles.push(new Projectile(player.x, player.y, mouse.x, mouse.y));
        
        for (let i = 0; i < 5; i++) {
            particles.push(new Particle(player.x, player.y, '#fbbf24', 0.4));
        }
    }

    function spawnWave() {
        const count = 4 + (wave * 3);
        for (let i = 0; i < count; i++) {
            setTimeout(() => {
                if (gameActive) enemies.push(new Enemy());
            }, i * 1200);
        }
    }

    function startGame() {
        score = 0;
        wave = 1;
        enemies = [];
        projectiles = [];
        particles = [];
        player = new Player();
        gameActive = true;
        
        scoreVal.innerText = score;
        waveVal.innerText = wave;
        menu.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        
        spawnWave();
        requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameActive = false;
        finalScore.innerText = `SCORE: ${score}`;
        finalWave.innerText = `SURVIVED WAVE ${wave}`;
        gameOverScreen.classList.remove('hidden');
        
        // Explosion at player position
        for(let i=0; i<40; i++) {
            particles.push(new Particle(player.x, player.y, '#ef4444', 1.5));
        }
    }

    function gameLoop() {
        if (!gameActive) return;

        ctx.fillStyle = 'rgba(10, 10, 10, 0.25)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        player.update();
        player.draw();

        for (let i = projectiles.length - 1; i >= 0; i--) {
            const p = projectiles[i];
            p.update();
            p.draw();

            for (let j = enemies.length - 1; j >= 0; j--) {
                const e = enemies[j];
                const dist = Math.hypot(p.x - e.x, p.y - e.y);
                if (dist < e.radius + p.radius) {
                    score += 100;
                    scoreVal.innerText = score;
                    for(let k=0; k<15; k++) particles.push(new Particle(e.x, e.y, '#ef4444'));
                    enemies.splice(j, 1);
                    projectiles.splice(i, 1);
                    
                    if (enemies.length === 0) {
                        wave++;
                        waveVal.innerText = wave;
                        spawnWave();
                    }
                    break;
                }
            }

            if (p.life <= 0 || p.x < -10 || p.x > canvas.width + 10 || p.y < -10 || p.y > canvas.height + 10) {
                if (projectiles[i] === p) projectiles.splice(i, 1);
            }
        }

        enemies.forEach(e => e.update());

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.update();
            p.draw();
            if (p.alpha <= 0) particles.splice(i, 1);
        }

        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
