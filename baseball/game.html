<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Platformer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Prevents scrollbars */
            background-color: #000; /* Black background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Full viewport height */
            font-family: 'Arial', sans-serif;
            color: white;
            text-align: center;
        }
        canvas {
            display: block; /* Remove extra space below canvas */
            border: 1px solid #555; /* Slightly more visible border */
            background-color: #111; /* Dark background for canvas area */
            cursor: none; /* Hide cursor for first-person feel */
        }
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 1000;
            text-align: left;
        }
        #instructions p {
            margin: 5px 0;
        }
        #loading-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            z-index: 1001;
            color: #eee;
            text-shadow: 2px 2px 5px #000;
        }
        #level-complete-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px;
            z-index: 1002;
            color: #00ff00; /* Bright green */
            text-shadow: 2px 2px 8px #000;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            display: none; /* Hidden by default */
        }
    </style>
</head>
<body>

    <div id="loading-message">Loading assets...</div>
    <div id="instructions">
        <p>Move: WASD / Arrow Keys</p>
        <p>Look: Mouse</p>
        <p>Jump: Spacebar</p>
        <p>(Click canvas to lock mouse)</p>
    </div>
    <div id="level-complete-message">Level Complete!</div>

    <canvas id="gameCanvas"></canvas>

    <!-- Load Three.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

    <!-- Game Script -->
    <script>
        // --- Game State Variables ---
        let currentLevel = 1;
        const totalLevels = 1; // Define the total number of levels
        let levelComplete = false;

        // --- Debugging Check ---
        if (typeof THREE === 'undefined') {
            console.error("THREE.js library not loaded. Please check the CDN link and your internet connection.");
            document.getElementById('loading-message').innerText = "Error: Three.js not loaded.";
        }

        // --- Basic Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1); // Renderer background color

        // --- Asset Loading ---
        const loadingManager = new THREE.LoadingManager();
        loadingManager.onLoad = () => {
            document.getElementById('loading-message').style.display = 'none'; // Hide loading message when done
            console.log("All assets loaded. Starting game.");
            gameLoop(); // Start the game loop only after assets are loaded
        };
        loadingManager.onProgress = (url, itemsLoaded, itemsTotal) => {
            const progress = (itemsLoaded / itemsTotal) * 100;
            document.getElementById('loading-message').innerText = `Loading... ${Math.round(progress)}%`;
        };
        loadingManager.onError = (url) => {
            console.error(`There was an error loading: ${url}`);
            document.getElementById('loading-message').innerText = "Error loading assets.";
        };

        const textureLoader = new THREE.TextureLoader(loadingManager);

        // --- Materials ---
        // Player Material - Changed to a vibrant blue
        const playerMaterial = new THREE.MeshStandardMaterial({
            color: 0x0000ff, // Vibrant Blue
            roughness: 0.5,
            metalness: 0.2
        });

        const platformTexture = textureLoader.load('https://threejs.org/examples/textures/ash_uv.jpg');
        const platformMaterial = new THREE.MeshStandardMaterial({
            map: platformTexture,
            roughness: 0.7,
            metalness: 0.1
        });

        const floorTexture = textureLoader.load('https://threejs.org/examples/textures/water.jpg');
        const floorMaterial = new THREE.MeshStandardMaterial({
            map: floorTexture,
            roughness: 0.8,
            metalness: 0.0,
            transparent: true,
            opacity: 0.7
        });

        // End Flag Material
        const flagMaterial = new THREE.MeshStandardMaterial({ color: 0xffff00 }); // Yellow flag

        // --- Skybox ---
        const skyboxLoader = new THREE.CubeTextureLoader(loadingManager);
        const skybox = skyboxLoader.load([
            'https://threejs.org/examples/textures/cube/skybox/px.jpg', // +X
            'https://threejs.org/examples/textures/cube/skybox/nx.jpg', // -X
            'https://threejs.org/examples/textures/cube/skybox/py.jpg', // +Y
            'https://threejs.org/examples/textures/cube/skybox/ny.jpg', // -Y
            'https://threejs.org/examples/textures/cube/skybox/pz.jpg', // +Z
            'https://threejs.org/examples/textures/cube/skybox/nz.jpg'  // -Z
        ]);
        scene.background = skybox;

        // --- Game World Creation ---
        const floorGeometry = new THREE.PlaneGeometry(50, 50);
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -1; // Base of the floor is at y = -1
        scene.add(floor);

        const platformGeometry = new THREE.BoxGeometry(5, 1, 5);
        const platforms = []; // Array to hold platforms for collision

        const platform1 = new THREE.Mesh(platformGeometry, platformMaterial);
        platform1.position.set(0, 1, -5);
        scene.add(platform1);
        platforms.push(platform1);

        const platform2 = new THREE.Mesh(platformGeometry, platformMaterial);
        platform2.position.set(5, 2, -10);
        scene.add(platform2);
        platforms.push(platform2);

        const platform3 = new THREE.Mesh(platformGeometry, platformMaterial);
        platform3.position.set(-5, 3, -15);
        scene.add(platform3);
        platforms.push(platform3);

        // --- Player Character ---
        const playerGeometry = new THREE.BoxGeometry(1, 2, 1); // Using box for simplicity
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        player.position.set(0, 2, 0); // Start player slightly above the floor
        scene.add(player);

        // --- End Flag ---
        const flagPoleGeometry = new THREE.CylinderGeometry(0.2, 0.2, 5, 8); // Thin pole
        const flagPole = new THREE.Mesh(flagPoleGeometry, new THREE.MeshStandardMaterial({ color: 0x808080 })); // Grey pole
        flagPole.position.set(-15, 1.5, -20); // Position the flag pole
        scene.add(flagPole);

        const flagGeometry = new THREE.PlaneGeometry(2, 1.5); // Flat flag shape
        const flag = new THREE.Mesh(flagGeometry, flagMaterial);
        flag.position.set(-15 + 1.5, 1.5 + 2.5, -20); // Position flag on top of pole
        flag.rotation.y = Math.PI / 4; // Angle flag slightly
        scene.add(flag);
        const endFlagObject = flag; // Use the flag mesh for collision detection

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 10, 7.5);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 1024;
        directionalLight.shadow.mapSize.height = 1024;
        directionalLight.shadow.camera.near = 0.5;
        directionalLight.shadow.camera.far = 20;
        directionalLight.shadow.camera.left = -10;
        directionalLight.shadow.camera.right = 10;
        directionalLight.shadow.camera.top = 10;
        directionalLight.shadow.camera.bottom = -10;
        scene.add(directionalLight);

        // --- Camera Control Variables ---
        let yaw = 0;
        let pitch = 0;
        const pitchLimit = Math.PI / 2;

        // --- Input Variables ---
        const keys = {};
        const moveSpeed = 8;
        const friction = 0.9;
        const epsilon = 0.0001;

        document.addEventListener('keydown', (event) => {
            keys[event.key] = true;
            if (event.key === ' ') {
                event.preventDefault();
            }
        });
        document.addEventListener('keyup', (event) => {
            keys[event.key] = false;
        });

        document.addEventListener('mousemove', (event) => {
            const mouseSensitivity = 0.002;
            yaw -= event.movementX * mouseSensitivity;
            pitch -= event.movementY * mouseSensitivity;
            pitch = Math.max(-pitchLimit, Math.min(pitchLimit, pitch));

            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        });

        // --- Physics Variables ---
        let playerVelocity = new THREE.Vector3(0, 0, 0);
        const gravity = -25;
        const jumpForce = 12;
        let isGrounded = false;

        // --- Helper to get bounding box corners ---
        function getBoundingBox(object) {
            if (!object) return null;
            const box = new THREE.Box3().setFromObject(object);
            return { min: box.min, max: box.max };
        }

        // --- Collision Resolution Function ---
        function resolveCollisions(deltaTime) {
            const currentVelocity = playerVelocity.clone();
            const playerHalfHeight = playerGeometry.parameters.height / 2;

            // Tentative move
            player.position.x += currentVelocity.x * deltaTime;
            player.position.y += currentVelocity.y * deltaTime;
            player.position.z += currentVelocity.z * deltaTime;

            const playerBB = getBoundingBox(player);
            if (!playerBB) return;

            let landedOnSurfaceThisFrame = false;

            const allSurfaces = [
                { object: floor, geometry: floorGeometry },
                ...platforms.map(p => ({ object: p, geometry: platformGeometry })),
                { object: endFlagObject, geometry: flagGeometry } // Include the end flag
            ];

            for (const surface of allSurfaces) {
                const surfaceBB = getBoundingBox(surface.object);
                if (!surfaceBB) continue;

                const overlapX = playerBB.min.x < surfaceBB.max.x && playerBB.max.x > surfaceBB.min.x;
                const overlapY = playerBB.min.y < surfaceBB.max.y && playerBB.max.y > surfaceBB.min.y;
                const overlapZ = playerBB.min.z < surfaceBB.max.z && playerBB.max.z > surfaceBB.min.z;

                if (overlapX && overlapY && overlapZ) {
                    // Collision detected
                    const depthX = Math.min(playerBB.max.x - surfaceBB.min.x, surfaceBB.max.x - playerBB.min.x);
                    const depthY = Math.min(playerBB.max.y - surfaceBB.min.y, surfaceBB.max.y - playerBB.min.y);
                    const depthZ = Math.min(playerBB.max.z - surfaceBB.min.z, surfaceBB.max.z - playerBB.min.z);

                    if (depthX < depthY && depthX < depthZ) { // Collision primarily on X axis
                        if (currentVelocity.x > 0) player.position.x = surfaceBB.min.x - (playerGeometry.parameters.width / 2);
                        else player.position.x = surfaceBB.max.x + (playerGeometry.parameters.width / 2);
                        playerVelocity.x = 0;
                    } else if (depthY < depthZ) { // Collision primarily on Y axis
                        if (currentVelocity.y < 0) { // Falling (landing)
                            player.position.y = surfaceBB.max.y + playerHalfHeight;
                            landedOnSurfaceThisFrame = true;
                        } else { // Hitting ceiling
                            player.position.y = surfaceBB.min.y - playerHalfHeight - playerGeometry.parameters.height;
                        }
                        playerVelocity.y = 0;
                    } else { // Collision primarily on Z axis
                        if (currentVelocity.z > 0) player.position.z = surfaceBB.min.z - (playerGeometry.parameters.depth / 2);
                        else player.position.z = surfaceBB.max.z + (playerGeometry.parameters.depth / 2);
                        playerVelocity.z = 0;
                    }
                }
            }

            isGrounded = landedOnSurfaceThisFrame;

            // Safety net for falling out of bounds
            if (playerVelocity.y < 0 && !isGrounded && player.position.y < -20) {
                console.warn("Player appears to be falling out of bounds!");
                resetPlayer(); // Use a reset function
            }
        }

        // --- Game Logic Functions ---
        function resetPlayer() {
            player.position.set(0, 2, 0); // Reset to a safe starting position
            playerVelocity.set(0, 0, 0);
            isGrounded = false;
            levelComplete = false; // Reset level completion
            document.getElementById('level-complete-message').style.display = 'none'; // Hide message
        }

        function nextLevel() {
            console.log("Level Complete!");
            levelComplete = true;
            document.getElementById('level-complete-message').style.display = 'block';
            // In a real game, you'd load the next level here
            // For now, we'll just show the message and potentially stop the game loop
            // Or you could have a button to restart/next level
        }

        // --- Game Loop ---
        const clock = new THREE.Clock();

        function gameLoop() {
            if (levelComplete) {
                // Optional: Stop game loop or show restart option
                // requestAnimationFrame(gameLoop); // Keep rendering static scene
                return; // Stop further updates
            }

            const deltaTime = clock.getDelta();

            // --- Player Movement and Physics ---
            playerVelocity.y += gravity * deltaTime;

            let horizontalInput = new THREE.Vector3();
            if (keys['w'] || keys['ArrowUp']) horizontalInput.z -= 1;
            if (keys['s'] || keys['ArrowDown']) horizontalInput.z += 1;
            if (keys['a'] || keys['ArrowLeft']) horizontalInput.x -= 1;
            if (keys['d'] || keys['ArrowRight']) horizontalInput.x += 1;

            if (horizontalInput.lengthSq() > 0) {
                horizontalInput.normalize();
                const yawRotationMatrix = new THREE.Matrix4();
                yawRotationMatrix.makeRotationY(camera.rotation.y);
                horizontalInput.applyMatrix4(yawRotationMatrix);

                playerVelocity.x = horizontalInput.x * moveSpeed;
                playerVelocity.z = horizontalInput.z * moveSpeed;
            } else {
                playerVelocity.x *= friction;
                playerVelocity.z *= friction;
                if (Math.abs(playerVelocity.x) < 0.01) playerVelocity.x = 0;
                if (Math.abs(playerVelocity.z) < 0.01) playerVelocity.z = 0;
            }

            // --- Collision Detection and Resolution ---
            resolveCollisions(deltaTime);

            // Apply resolved velocity to player's position
            player.position.x += playerVelocity.x * deltaTime;
            player.position.y += playerVelocity.y * deltaTime;
            player.position.z += playerVelocity.z * deltaTime;

            // --- Jumping ---
            if (keys[' '] && isGrounded) {
                playerVelocity.y = jumpForce;
                isGrounded = false;
            }

            // --- Check for Level Completion ---
            const playerBB = getBoundingBox(player);
            const flagBB = getBoundingBox(endFlagObject);
            if (playerBB && flagBB) {
                const overlapX = playerBB.min.x < flagBB.max.x && playerBB.max.x > flagBB.min.x;
                const overlapY = playerBB.min.y < flagBB.max.y && playerBB.max.y > flagBB.min.y;
                const overlapZ = playerBB.min.z < flagBB.max.z && playerBB.max.z > flagBB.min.z;
                if (overlapX && overlapY && overlapZ) {
                    nextLevel();
                }
            }

            // --- Camera Update ---
            const camForwardXZ = new THREE.Vector3();
            camera.getWorldDirection(camForwardXZ);
            camForwardXZ.y = 0;
            camForwardXZ.normalize();

            const followDistance = 7;
            const cameraTargetPosition = player.position.clone().sub(camForwardXZ.multiplyScalar(followDistance));
            cameraTargetPosition.y = player.position.y + 4; // Keep camera elevated

            // Smoothly interpolate camera position
            camera.position.lerp(cameraTargetPosition, 0.1); // Use lerp for smoother follow

            camera.lookAt(player.position);

            // --- Rendering ---
            renderer.render(scene, camera);

            requestAnimationFrame(gameLoop);
        }

        // --- Event Listener for Window Resizing ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Pointer Lock Setup ---
        document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
        document.exitPointerLock = document.exitPointerLock || document.mozExitPointerLock;

        document.getElementById('gameCanvas').addEventListener('click', function() {
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', lockChangeAlert, false);
        document.addEventListener('mozpointerlockchange', lockChangeAlert, false);

        function lockChangeAlert() {
            if (document.pointerLockElement === document.body || document.mozPointerLockElement === document.body) {
                console.log('Pointer locked');
            } else {
                console.log('Pointer unlocked');
            }
        }

        // --- Initial Setup ---
        // Reset player and hide level complete message on load
        resetPlayer();
        document.getElementById('level-complete-message').style.display = 'none';
    </script>
</body>
</html>
