<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TETRIS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #0f0f1a;
    --border: #1a1a2e;
    --glow-cyan: #00ffff;
    --glow-pink: #ff00aa;
    --glow-yellow: #ffee00;
    --grid-line: rgba(255,255,255,0.03);
    --text: #e0e0ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* CRT vignette */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 99;
  }

  .game-wrapper {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    position: relative;
  }

  /* Side panels */
  .side-panel {
    width: 160px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-box {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 14px;
    position: relative;
    box-shadow: 0 0 20px rgba(0,255,255,0.05), inset 0 0 20px rgba(0,0,0,0.5);
  }

  .panel-box::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,255,255,0.02) 0%, transparent 50%);
    pointer-events: none;
  }

  .panel-label {
    font-size: 6px;
    color: var(--glow-cyan);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-shadow: 0 0 10px var(--glow-cyan);
  }

  .panel-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: var(--glow-yellow);
    text-shadow: 0 0 15px var(--glow-yellow), 0 0 30px rgba(255,238,0,0.3);
    letter-spacing: 1px;
  }

  /* Next piece preview */
  #next-canvas {
    display: block;
    margin: 4px auto 0;
    image-rendering: pixelated;
  }

  /* Main board */
  .board-container {
    position: relative;
  }

  .board-frame {
    background: var(--panel);
    border: 2px solid #1e1e3a;
    padding: 4px;
    box-shadow:
      0 0 0 1px #0a0a1a,
      0 0 40px rgba(0,255,255,0.08),
      0 0 80px rgba(0,0,0,0.8),
      inset 0 0 40px rgba(0,0,0,0.5);
    position: relative;
  }

  /* Corner accents */
  .board-frame::before, .board-frame::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    border-color: var(--glow-cyan);
    border-style: solid;
    box-shadow: 0 0 8px var(--glow-cyan);
  }
  .board-frame::before { top: -2px; left: -2px; border-width: 2px 0 0 2px; }
  .board-frame::after  { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; }

  #game-canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* Title */
  .title-area {
    text-align: center;
    margin-bottom: 4px;
  }

  .title {
    font-size: 10px;
    color: var(--glow-pink);
    text-shadow: 0 0 10px var(--glow-pink), 0 0 25px rgba(255,0,170,0.5);
    letter-spacing: 6px;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* Overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(8, 8, 15, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 10;
    backdrop-filter: blur(2px);
  }

  .overlay.hidden { display: none; }

  .overlay-title {
    font-size: 14px;
    color: var(--glow-cyan);
    text-shadow: 0 0 20px var(--glow-cyan), 0 0 40px rgba(0,255,255,0.4);
    letter-spacing: 4px;
    animation: blink 1.2s step-end infinite;
  }

  .overlay-sub {
    font-size: 7px;
    color: var(--text);
    opacity: 0.6;
    text-align: center;
    line-height: 2;
    letter-spacing: 1px;
  }

  .overlay-score {
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    color: var(--glow-yellow);
    text-shadow: 0 0 15px var(--glow-yellow);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Level indicator */
  .level-bar {
    height: 4px;
    background: var(--border);
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .level-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--glow-cyan), var(--glow-pink));
    box-shadow: 0 0 8px var(--glow-cyan);
    transition: width 0.3s ease;
  }

  /* Controls hint */
  .controls {
    margin-top: 4px;
  }

  .ctrl-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    align-items: center;
  }

  .ctrl-key {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--glow-cyan);
    background: rgba(0,255,255,0.08);
    border: 1px solid rgba(0,255,255,0.2);
    padding: 2px 5px;
    text-shadow: 0 0 6px var(--glow-cyan);
  }

  .ctrl-desc {
    font-size: 5px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
  }

  /* Line clear flash */
  @keyframes flashLine {
    0% { opacity: 1; }
    50% { opacity: 0; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <!-- Left panel -->
  <div class="side-panel">
    <div class="title-area">
      <div class="title">TETRIS</div>
    </div>

    <div class="panel-box">
      <div class="panel-label">Score</div>
      <div class="panel-value" id="score-display">0</div>
    </div>

    <div class="panel-box">
      <div class="panel-label">Level</div>
      <div class="panel-value" id="level-display">1</div>
      <div class="level-bar"><div class="level-fill" id="level-fill" style="width:0%"></div></div>
    </div>

    <div class="panel-box">
      <div class="panel-label">Lines</div>
      <div class="panel-value" id="lines-display">0</div>
    </div>

    <div class="panel-box">
      <div class="panel-label">Hi-Score</div>
      <div class="panel-value" id="hiscore-display">0</div>
    </div>
  </div>

  <!-- Main board -->
  <div class="board-container">
    <div class="board-frame">
      <canvas id="game-canvas" width="300" height="600"></canvas>

      <!-- Start overlay -->
      <div class="overlay" id="start-overlay">
        <div class="overlay-title">TETRIS</div>
        <div class="overlay-sub">PRESS SPACE TO START<br><br>← → MOVE &nbsp; ↑ ROTATE<br>↓ SOFT DROP &nbsp; Z HARD DROP<br>P PAUSE</div>
      </div>

      <!-- Pause overlay -->
      <div class="overlay hidden" id="pause-overlay">
        <div class="overlay-title">PAUSED</div>
        <div class="overlay-sub">PRESS P TO RESUME</div>
      </div>

      <!-- Game over overlay -->
      <div class="overlay hidden" id="gameover-overlay">
        <div class="overlay-title">GAME OVER</div>
        <div class="overlay-score" id="final-score">0</div>
        <div class="overlay-sub">PRESS SPACE TO RESTART</div>
      </div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="side-panel">
    <div class="panel-box">
      <div class="panel-label">Next</div>
      <canvas id="next-canvas" width="120" height="100"></canvas>
    </div>

    <div class="panel-box controls">
      <div class="panel-label">Controls</div>
      <div class="ctrl-row"><span class="ctrl-key">←→</span><span class="ctrl-desc">MOVE</span></div>
      <div class="ctrl-row"><span class="ctrl-key">↑</span><span class="ctrl-desc">ROTATE</span></div>
      <div class="ctrl-row"><span class="ctrl-key">↓</span><span class="ctrl-desc">SOFT DROP</span></div>
      <div class="ctrl-row"><span class="ctrl-key">Z</span><span class="ctrl-desc">HARD DROP</span></div>
      <div class="ctrl-row"><span class="ctrl-key">P</span><span class="ctrl-desc">PAUSE</span></div>
    </div>
  </div>
</div>

<script>
const COLS = 10, ROWS = 20;
const BLOCK = 30;
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nctx = nextCanvas.getContext('2d');

// Tetromino definitions
const PIECES = [
  { shape: [[1,1,1,1]], color: '#00ffff', glow: '#00ffff' },         // I
  { shape: [[1,1],[1,1]], color: '#ffee00', glow: '#ffee00' },        // O
  { shape: [[0,1,0],[1,1,1]], color: '#aa00ff', glow: '#cc44ff' },    // T
  { shape: [[1,0,0],[1,1,1]], color: '#ff8800', glow: '#ffaa33' },    // J
  { shape: [[0,0,1],[1,1,1]], color: '#0066ff', glow: '#3388ff' },    // L
  { shape: [[0,1,1],[1,1,0]], color: '#00ff44', glow: '#00ff44' },    // S
  { shape: [[1,1,0],[0,1,1]], color: '#ff0044', glow: '#ff2255' },    // Z
];

// Game state
let board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
let current = null, next = null, score = 0, level = 1, lines = 0, hiScore = 0;
let gameState = 'start', lastTime = 0, dropCount = 0, flashRows = [], flashTimer = 0;
let dropInterval;

function init() {
  board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  score = 0;
  level = 1;
  lines = 0;
  flashRows = [];
  flashTimer = 0;
  dropCount = 0;
  lastTime = 0;
  current = spawnPiece();
  next = spawnPiece();
  updateUI();
}

function spawnPiece() {
  const p = PIECES[Math.floor(Math.random() * PIECES.length)];
  return {
    shape: p.shape,
    color: p.color,
    glow: p.glow,
    x: Math.floor(COLS / 2) - Math.floor(p.shape[0].length / 2),
    y: 0
  };
}

function rotate(shape) {
  return shape[0].map((_, i) => shape.map(r => r[i]).reverse());
}

function collides(piece, dx=0, dy=0, shape=null) {
  const s = shape || piece.shape;
  for (let r = 0; r < s.length; r++) {
    for (let c = 0; c < s[r].length; c++) {
      if (!s[r][c]) continue;
      const nx = piece.x + c + dx;
      const ny = piece.y + r + dy;
      if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
      if (ny >= 0 && board[ny][nx]) return true;
    }
  }
  return false;
}

function lock() {
  let died = false;
  current.shape.forEach((row, r) => {
    row.forEach((v, c) => {
      if (v) {
        if (current.y + r < 0) { died = true; return; }
        board[current.y + r][current.x + c] = current.color;
      }
    });
  });
  if (died) { endGame(); return; }
  clearLines();
  current = next;
  next = spawnPiece();
  if (collides(current)) { endGame(); return; }
  updateUI();
}

function clearLines() {
  const cleared = [];
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c)) cleared.push(r);
  }
  if (cleared.length > 0) {
    flashRows = cleared;
    flashTimer = 8; // frames to flash
    const points = [0, 100, 300, 500, 800][cleared.length] * level;
    score += points;
    lines += cleared.length;
    level = Math.floor(lines / 10) + 1;
    hiScore = Math.max(hiScore || 0, score);
    // Remove rows after flash (handled in draw)
  }
}

function removeFlashRows() {
  flashRows.sort((a,b) => b-a).forEach(r => {
    board.splice(r, 1);
    board.unshift(Array(COLS).fill(0));
  });
  flashRows = [];
}

function hardDrop() {
  let dy = 0;
  while (!collides(current, 0, dy+1)) dy++;
  score += dy * 2;
  current.y += dy;
  lock();
}

function getGhostY() {
  let dy = 0;
  while (!collides(current, 0, dy+1)) dy++;
  return current.y + dy;
}

// Drawing
function drawBlock(ctx, x, y, color, glow, alpha=1) {
  const px = x * BLOCK, py = y * BLOCK;
  ctx.save();
  ctx.globalAlpha = alpha;

  // Shadow/glow
  ctx.shadowColor = glow || color;
  ctx.shadowBlur = 12;

  // Main block
  const grad = ctx.createLinearGradient(px, py, px + BLOCK, py + BLOCK);
  grad.addColorStop(0, lighten(color, 0.3));
  grad.addColorStop(1, color);
  ctx.fillStyle = grad;
  ctx.fillRect(px + 1, py + 1, BLOCK - 2, BLOCK - 2);

  // Inner highlight
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(px + 1, py + 1, BLOCK - 2, 4);
  ctx.fillRect(px + 1, py + 1, 4, BLOCK - 2);

  // Edge darker
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(px + 1.5, py + 1.5, BLOCK - 3, BLOCK - 3);

  ctx.restore();
}

function lighten(hex, amount) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (n >> 16) + Math.round(255 * amount));
  const g = Math.min(255, ((n >> 8) & 0xff) + Math.round(255 * amount));
  const b = Math.min(255, (n & 0xff) + Math.round(255 * amount));
  return `rgb(${r},${g},${b})`;
}

function draw() {
  // Clear
  ctx.fillStyle = '#08080f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r*BLOCK); ctx.lineTo(COLS*BLOCK, r*BLOCK); ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c*BLOCK, 0); ctx.lineTo(c*BLOCK, ROWS*BLOCK); ctx.stroke();
  }

  // Board
  board.forEach((row, r) => {
    row.forEach((color, c) => {
      if (color) {
        const isFlash = flashRows.includes(r);
        if (isFlash) {
          const alpha = flashTimer % 2 === 0 ? 1 : 0.2;
          drawBlock(ctx, c, r, '#ffffff', '#ffffff', alpha);
        } else {
          drawBlock(ctx, c, r, color, color);
        }
      }
    });
  });

  if (gameState === 'playing' && current) {
    // Ghost piece
    const ghostY = getGhostY();
    if (ghostY !== current.y) {
      current.shape.forEach((row, r) => {
        row.forEach((v, c) => {
          if (v) {
            const px = (current.x + c) * BLOCK;
            const py = (ghostY + r) * BLOCK;
            ctx.save();
            ctx.strokeStyle = current.color;
            ctx.globalAlpha = 0.2;
            ctx.lineWidth = 1;
            ctx.strokeRect(px + 1, py + 1, BLOCK - 2, BLOCK - 2);
            ctx.restore();
          }
        });
      });
    }

    // Current piece
    current.shape.forEach((row, r) => {
      row.forEach((v, c) => {
        if (v) drawBlock(ctx, current.x + c, current.y + r, current.color, current.glow);
      });
    });
  }
}

function drawNext() {
  nctx.fillStyle = '#0a0a12';
  nctx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (!next) return;
  const bs = 20;
  const sh = next.shape, rows = sh.length, cols = sh[0].length;
  const ox = Math.floor((nextCanvas.width - cols * bs) / 2);
  const oy = Math.floor((nextCanvas.height - rows * bs) / 2);
  sh.forEach((row, r) => {
    row.forEach((v, c) => {
      if (!v) return;
      const px = ox + c * bs, py = oy + r * bs;
      nctx.save();
      nctx.shadowColor = next.glow;
      nctx.shadowBlur = 10;
      const grad = nctx.createLinearGradient(px, py, px+bs, py+bs);
      grad.addColorStop(0, lighten(next.color, 0.3));
      grad.addColorStop(1, next.color);
      nctx.fillStyle = grad;
      nctx.fillRect(px+1, py+1, bs-2, bs-2);
      nctx.fillStyle = 'rgba(255,255,255,0.15)';
      nctx.fillRect(px+1, py+1, bs-2, 3);
      nctx.restore();
    });
  });
}

function updateUI() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('level-display').textContent = level;
  document.getElementById('lines-display').textContent = lines;
  document.getElementById('hiscore-display').textContent = hiScore || 0;
  const pct = ((lines % 10) / 10) * 100;
  document.getElementById('level-fill').style.width = pct + '%';
}

function getDropSpeed() {
  // Faster as level increases
  const speeds = [800, 720, 630, 550, 470, 380, 300, 220, 130, 100, 80];
  return speeds[Math.min(level - 1, speeds.length - 1)];
}

let softDrop = false;

function gameLoop(timestamp) {
  if (gameState !== 'playing') return;

  const dt = timestamp - lastTime;
  lastTime = timestamp;
  dropCount += dt;

  const speed = softDrop ? Math.min(getDropSpeed(), 80) : getDropSpeed();

  if (flashRows.length > 0) {
    flashTimer--;
    if (flashTimer <= 0) {
      removeFlashRows();
      updateUI();
    }
  } else if (dropCount >= speed) {
    dropCount = 0;
    if (!collides(current, 0, 1)) {
      current.y++;
    } else {
      lock();
    }
  }

  if (gameState !== 'playing') return;
  draw();
  drawNext();
  requestAnimationFrame(gameLoop);
}

function startGame() {
  hiScore = hiScore || 0;
  init();
  gameState = 'playing';
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('gameover-overlay').classList.add('hidden');
  document.getElementById('pause-overlay').classList.add('hidden');
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function endGame() {
  gameState = 'gameover';
  document.getElementById('gameover-overlay').classList.remove('hidden');
  document.getElementById('final-score').textContent = score;
}

function togglePause() {
  if (gameState === 'playing') {
    gameState = 'paused';
    document.getElementById('pause-overlay').classList.remove('hidden');
  } else if (gameState === 'paused') {
    gameState = 'playing';
    document.getElementById('pause-overlay').classList.add('hidden');
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  }
}

// Initial render
gameState = 'start';
draw();
drawNext();

// Input
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (gameState === 'start' || gameState === 'gameover') { startGame(); return; }
  }
  if (e.key === 'p' || e.key === 'P') {
    if (gameState === 'playing' || gameState === 'paused') togglePause();
    return;
  }
  if (gameState !== 'playing' || flashRows.length > 0) return;

  switch(e.code) {
    case 'ArrowLeft':
      e.preventDefault();
      if (!collides(current, -1, 0)) current.x--;
      break;
    case 'ArrowRight':
      e.preventDefault();
      if (!collides(current, 1, 0)) current.x++;
      break;
    case 'ArrowDown':
      e.preventDefault();
      softDrop = true;
      break;
    case 'ArrowUp':
      e.preventDefault();
      const rot = rotate(current.shape);
      // Wall kick
      let kick = 0;
      if (collides(current, 0, 0, rot)) {
        if (!collides(current, 1, 0, rot)) kick = 1;
        else if (!collides(current, -1, 0, rot)) kick = -1;
        else if (!collides(current, 2, 0, rot)) kick = 2;
        else if (!collides(current, -2, 0, rot)) kick = -2;
      }
      if (!collides(current, kick, 0, rot)) {
        current.shape = rot;
        current.x += kick;
      }
      break;
    case 'KeyZ':
      e.preventDefault();
      hardDrop();
      break;
  }
});

document.addEventListener('keyup', e => {
  if (e.code === 'ArrowDown') softDrop = false;
});

// Touch controls for mobile
let touchStartX, touchStartY;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, {passive: false});

canvas.addEventListener('touchend', e => {
  if (!touchStartX) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const adx = Math.abs(dx), ady = Math.abs(dy);

  if (gameState === 'start' || gameState === 'gameover') { startGame(); return; }
  if (gameState !== 'playing') return;

  if (adx < 10 && ady < 10) {
    // Tap = rotate
    const rot = rotate(current.shape);
    if (!collides(current, 0, 0, rot)) current.shape = rot;
  } else if (adx > ady) {
    // Swipe horizontal
    const steps = Math.round(adx / BLOCK);
    const dir = dx > 0 ? 1 : -1;
    for (let i = 0; i < steps; i++) {
      if (!collides(current, dir, 0)) current.x += dir;
    }
  } else if (dy > 40) {
    // Swipe down = hard drop
    hardDrop();
  }
  e.preventDefault();
}, {passive: false});
</script>
</body>
</html>
