<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        :root {
            --bg-empty: #cdc1b4;
            --bg-2: #eee4da;
            --bg-4: #ede0c8;
            --bg-8: #f2b179;
            --bg-16: #f59563;
            --bg-32: #f67c5f;
            --bg-64: #f65e3b;
            --bg-128: #edcf72;
            --bg-256: #edcc61;
            --bg-512: #edc850;
            --bg-1024: #edc53f;
            --bg-2048: #edc22e;
            --text-dark: #776e65;
            --text-light: #f9f6f2;
            --grid-gap: 12px;
            --grid-padding: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf8ef;
            color: #776e65;
            touch-action: none;
        }

        .grid-container {
            background-color: #bbada0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: var(--grid-gap);
            padding: var(--grid-padding);
            border-radius: 8px;
            position: relative;
            aspect-ratio: 1 / 1;
        }

        .grid-cell {
            background-color: var(--bg-empty);
            border-radius: 4px;
            width: 100%;
            height: 100%;
        }

        .tile {
            position: absolute;
            /* Calculate width: (Total - padding*2 - gaps*3) / 4 */
            width: calc((100% - (var(--grid-padding) * 2) - (var(--grid-gap) * 3)) / 4);
            height: calc((100% - (var(--grid-padding) * 2) - (var(--grid-gap) * 3)) / 4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            border-radius: 4px;
            transition: transform 100ms ease-in-out, left 100ms ease-in-out, top 100ms ease-in-out;
            z-index: 10;
            user-select: none;
        }

        .tile-new {
            animation: appear 200ms ease-in-out;
        }

        .tile-merged {
            z-index: 20;
            animation: pop 200ms ease-in-out;
        }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Tile Color Map */
        .v-2 { background-color: var(--bg-2); color: var(--text-dark); font-size: 2.5rem; }
        .v-4 { background-color: var(--bg-4); color: var(--text-dark); font-size: 2.5rem; }
        .v-8 { background-color: var(--bg-8); color: var(--text-light); font-size: 2.5rem; }
        .v-16 { background-color: var(--bg-16); color: var(--text-light); font-size: 2.2rem; }
        .v-32 { background-color: var(--bg-32); color: var(--text-light); font-size: 2.2rem; }
        .v-64 { background-color: var(--bg-64); color: var(--text-light); font-size: 2.2rem; }
        .v-128 { background-color: var(--bg-128); color: var(--text-light); font-size: 1.8rem; box-shadow: 0 0 10px rgba(243, 215, 116, 0.4); }
        .v-256 { background-color: var(--bg-256); color: var(--text-light); font-size: 1.8rem; box-shadow: 0 0 15px rgba(243, 215, 116, 0.5); }
        .v-512 { background-color: var(--bg-512); color: var(--text-light); font-size: 1.8rem; }
        .v-1024 { background-color: var(--bg-1024); color: var(--text-light); font-size: 1.4rem; }
        .v-2048 { background-color: var(--bg-2048); color: var(--text-light); font-size: 1.4rem; }

        @media (max-width: 480px) {
            :root {
                --grid-gap: 8px;
                --grid-padding: 8px;
            }
            .tile { font-size: 1.5rem !important; }
            .v-1024, .v-2048 { font-size: 1.1rem !important; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-6xl font-bold">2048</h1>
            <div class="flex gap-2 text-center">
                <div class="bg-[#bbada0] rounded-md px-4 py-2 text-white min-w-[80px]">
                    <div class="text-xs font-bold uppercase opacity-70">Score</div>
                    <div id="score" class="text-xl font-bold leading-tight">0</div>
                </div>
                <div class="bg-[#bbada0] rounded-md px-4 py-2 text-white min-w-[80px]">
                    <div class="text-xs font-bold uppercase opacity-70">Best</div>
                    <div id="best-score" class="text-xl font-bold leading-tight">0</div>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-end mb-6">
            <p class="text-sm opacity-80 max-w-[200px]">Join the numbers and get to the <strong>2048 tile!</strong></p>
            <button id="new-game" class="bg-[#8f7a66] hover:bg-[#7f6a56] text-white font-bold py-2 px-6 rounded-md transition-colors">
                New Game
            </button>
        </div>

        <!-- Game Container -->
        <div class="relative">
            <div id="grid" class="grid-container">
                <!-- Static Background Grid Cells -->
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>

            <!-- Overlays -->
            <div id="game-over" class="hidden absolute inset-0 bg-white/60 flex flex-col items-center justify-center rounded-lg z-50 animate-in fade-in duration-500">
                <h2 class="text-4xl font-bold mb-4">Game Over!</h2>
                <button onclick="game.init()" class="bg-[#8f7a66] text-white font-bold py-3 px-8 rounded-md shadow-lg">Try again</button>
            </div>

            <div id="game-won" class="hidden absolute inset-0 bg-[#edc22e]/60 flex flex-col items-center justify-center rounded-lg z-50">
                <h2 class="text-4xl font-bold text-white mb-4">You Win!</h2>
                <button onclick="game.init()" class="bg-[#8f7a66] text-white font-bold py-3 px-8 rounded-md shadow-lg">Keep playing</button>
            </div>
        </div>

        <p class="mt-8 text-sm opacity-60 text-center">
            <strong>HOW TO PLAY:</strong> Use your <strong>arrow keys</strong> or <strong>swipe</strong> to move the tiles.
        </p>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.gridElement = document.getElementById('grid');
                this.scoreElement = document.getElementById('score');
                this.bestScoreElement = document.getElementById('best-score');
                this.gameOverElement = document.getElementById('game-over');
                this.gameWonElement = document.getElementById('game-won');
                
                this.size = 4;
                this.cells = [];
                this.score = 0;
                this.bestScore = parseInt(localStorage.getItem('bestScore')) || 0;
                this.won = false;
                this.over = false;

                this.init();
                this.setupInputs();
            }

            init() {
                this.score = 0;
                this.won = false;
                this.over = false;
                this.cells = Array(this.size * this.size).fill(null);
                
                this.gameOverElement.classList.add('hidden');
                this.gameWonElement.classList.add('hidden');
                this.updateScore(0);
                this.bestScoreElement.innerText = this.bestScore;

                const existingTiles = document.querySelectorAll('.tile');
                existingTiles.forEach(t => t.remove());

                this.addRandomTile();
                this.addRandomTile();
                this.render();
            }

            addRandomTile() {
                const emptyIndices = this.cells.map((v, i) => v === null ? i : null).filter(v => v !== null);
                if (emptyIndices.length > 0) {
                    const idx = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
                    this.cells[idx] = {
                        value: Math.random() < 0.9 ? 2 : 4,
                        id: Math.random().toString(36).substr(2, 9),
                        merged: false,
                        new: true
                    };
                }
            }

            updateScore(amount) {
                this.score += amount;
                this.scoreElement.innerText = this.score;
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    this.bestScoreElement.innerText = this.bestScore;
                    localStorage.setItem('bestScore', this.bestScore);
                }
            }

            setupInputs() {
                document.addEventListener('keydown', (e) => {
                    if (this.over) return;
                    let moved = false;
                    switch(e.key) {
                        case 'ArrowUp': moved = this.move('up'); break;
                        case 'ArrowDown': moved = this.move('down'); break;
                        case 'ArrowLeft': moved = this.move('left'); break;
                        case 'ArrowRight': moved = this.move('right'); break;
                    }
                    if (moved) this.afterMove();
                });

                document.getElementById('new-game').addEventListener('click', () => this.init());

                let touchStartX, touchStartY;
                document.addEventListener('touchstart', e => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }, { passive: false });

                document.addEventListener('touchend', e => {
                    if (this.over) return;
                    const deltaX = e.changedTouches[0].clientX - touchStartX;
                    const deltaY = e.changedTouches[0].clientY - touchStartY;
                    if (Math.max(Math.abs(deltaX), Math.abs(deltaY)) > 30) {
                        let moved = false;
                        if (Math.abs(deltaX) > Math.abs(deltaY)) {
                            moved = deltaX > 0 ? this.move('right') : this.move('left');
                        } else {
                            moved = deltaY > 0 ? this.move('down') : this.move('up');
                        }
                        if (moved) this.afterMove();
                    }
                }, { passive: false });
            }

            afterMove() {
                this.addRandomTile();
                this.render();
                if (this.checkWin() && !this.won) {
                    this.won = true;
                    this.gameWonElement.classList.remove('hidden');
                }
                if (this.checkGameOver()) {
                    this.over = true;
                    this.gameOverElement.classList.remove('hidden');
                }
            }

            move(direction) {
                let moved = false;
                this.cells.forEach(c => { if (c) { c.merged = false; c.new = false; }});

                const isVertical = direction === 'up' || direction === 'down';
                const isReverse = direction === 'right' || direction === 'down';

                for (let i = 0; i < this.size; i++) {
                    let lineIndices = [];
                    for (let j = 0; j < this.size; j++) {
                        lineIndices.push(isVertical ? (j * this.size + i) : (i * this.size + j));
                    }
                    if (isReverse) lineIndices.reverse();

                    const currentLine = lineIndices.map(idx => this.cells[idx]);
                    const newLine = this.compress(currentLine);
                    
                    lineIndices.forEach((idx, j) => {
                        if (JSON.stringify(this.cells[idx]) !== JSON.stringify(newLine[j])) {
                            moved = true;
                            this.cells[idx] = newLine[j];
                        }
                    });
                }
                return moved;
            }

            compress(line) {
                let filtered = line.filter(item => item !== null);
                let result = [];
                for (let i = 0; i < filtered.length; i++) {
                    if (i < filtered.length - 1 && filtered[i].value === filtered[i + 1].value) {
                        const mergedValue = filtered[i].value * 2;
                        result.push({
                            value: mergedValue,
                            id: filtered[i].id,
                            merged: true,
                            new: false
                        });
                        this.updateScore(mergedValue);
                        i++;
                    } else {
                        result.push({ ...filtered[i], merged: false, new: false });
                    }
                }
                while (result.length < this.size) result.push(null);
                return result;
            }

            checkWin() { return this.cells.some(c => c && c.value === 2048); }

            checkGameOver() {
                if (this.cells.some(c => c === null)) return false;
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        const current = this.cells[i * this.size + j].value;
                        if (j < 3 && current === this.cells[i * this.size + j + 1].value) return false;
                        if (i < 3 && current === this.cells[(i + 1) * this.size + j].value) return false;
                    }
                }
                return true;
            }

            render() {
                const existingTiles = Array.from(document.querySelectorAll('.tile'));
                const currentIds = this.cells.filter(c => c !== null).map(c => c.id);

                existingTiles.forEach(tile => {
                    if (!currentIds.includes(tile.dataset.id)) tile.remove();
                });

                this.cells.forEach((cell, idx) => {
                    if (!cell) return;
                    const row = Math.floor(idx / this.size);
                    const col = idx % this.size;
                    
                    let tileElement = document.querySelector(`.tile[data-id="${cell.id}"]`);
                    if (!tileElement) {
                        tileElement = document.createElement('div');
                        tileElement.className = 'tile';
                        tileElement.dataset.id = cell.id;
                        this.gridElement.appendChild(tileElement);
                    }

                    // Strict calculation based on CSS variables
                    const isMobile = window.innerWidth <= 480;
                    const gap = isMobile ? 8 : 12;
                    const padding = isMobile ? 8 : 12;
                    
                    // Left = Padding + (Column * CellWidth) + (Column * Gap)
                    // CellWidth = (100% - Padding*2 - Gap*3) / 4
                    const left = `calc(${padding}px + ${col} * (100% - ${padding * 2}px - ${gap * 3}px) / 4 + ${col * gap}px)`;
                    const top = `calc(${padding}px + ${row} * (100% - ${padding * 2}px - ${gap * 3}px) / 4 + ${row * gap}px)`;

                    tileElement.style.left = left;
                    tileElement.style.top = top;
                    tileElement.innerText = cell.value;
                    tileElement.className = `tile v-${cell.value}`;
                    if (cell.new) tileElement.classList.add('tile-new');
                    if (cell.merged) tileElement.classList.add('tile-merged');
                });
            }
        }

        const game = new Game2048();
        window.addEventListener('resize', () => game.render());
    </script>
</body>
</html>
