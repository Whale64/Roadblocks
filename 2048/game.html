<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fusion Flux: Evolved</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'game-bg': 'var(--bg)',
                        'game-grid': 'var(--grid)',
                        'game-text': 'var(--text)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg: #fffcf0;
            --grid: #f0e4d0;
            --text: #5d4037;
        }
        .dark {
            --bg: #05050a;
            --grid: #151525;
            --text: #ffffff;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        }

        .grid-container { 
            background: var(--grid); 
            position: relative; 
            touch-action: none; 
            user-select: none;
        }

        .tile {
            position: absolute;
            transition: transform 100ms ease-in-out, left 100ms ease-in-out, top 100ms ease-in-out, background-color 200ms ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border-radius: 12px;
            z-index: 10;
        }

        .tile-appear { animation: appear 200ms cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes appear { from { opacity: 0; transform: scale(0.3); } to { opacity: 1; transform: scale(1); } }

        /* DARK MODE PALETTE (Neon High-Contrast) */
        .dark .tile-2 { background: #1e293b; color: #94a3b8; }
        .dark .tile-4 { background: #334155; color: #cbd5e1; }
        .dark .tile-8 { background: #3b82f6; color: #ffffff; }
        .dark .tile-16 { background: #6366f1; color: #ffffff; }
        .dark .tile-32 { background: #8b5cf6; color: #ffffff; }
        .dark .tile-64 { background: #a855f7; color: #ffffff; }
        .dark .tile-128 { background: #d946ef; color: #ffffff; box-shadow: 0 0 15px #d946ef; }
        .dark .tile-256 { background: #ec4899; color: #ffffff; box-shadow: 0 0 20px #ec4899; }
        .dark .tile-512 { background: #f43f5e; color: #ffffff; box-shadow: 0 0 25px #f43f5e; }
        .dark .tile-1024 { background: #f97316; color: #ffffff; border: 2px solid #ffffff; }
        .dark .tile-2048 { background: #fbbf24; color: #000000; box-shadow: 0 0 35px #fbbf24; }

        /* LIGHT MODE PALETTE */
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #fff; }
        .tile-16 { background: #f59563; color: #fff; }
        .tile-32 { background: #f67c5f; color: #fff; }
        .tile-64 { background: #f65e3b; color: #fff; }
        .tile-128 { background: #edcf72; color: #fff; }
        .tile-2048 { background: #edc22e; color: #fff; }

        #achievement-toast {
            position: fixed;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
        }
        #achievement-toast.show { top: 20px; }
    </style>
</head>
<body class="p-4">

    <!-- Notification Toast -->
    <div id="achievement-toast" class="flex items-center gap-4 bg-white dark:bg-zinc-900 shadow-2xl rounded-2xl p-4 border-2 border-indigo-500 min-w-[280px]">
        <div id="toast-icon" class="text-4xl">✨</div>
        <div>
            <div id="toast-tag" class="text-[10px] uppercase font-black text-indigo-500 tracking-widest">Evolution!</div>
            <div id="toast-title" class="text-lg font-bold leading-tight dark:text-white">Milestone</div>
        </div>
    </div>

    <div class="w-full max-w-md flex flex-col items-center">
        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-6">
            <h1 class="text-3xl font-black italic tracking-tighter dark:text-indigo-400">FUSION FLUX</h1>
            <div class="flex gap-2">
                <div class="bg-game-grid p-2 rounded-xl text-center min-w-[80px]">
                    <div class="text-[9px] uppercase font-black opacity-50">Score</div>
                    <div id="score" class="text-lg font-bold">0</div>
                </div>
                <div class="bg-game-grid p-2 rounded-xl text-center min-w-[80px]">
                    <div class="text-[9px] uppercase font-black opacity-50">Best</div>
                    <div id="best-score" class="text-lg font-bold">0</div>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="w-full flex justify-between items-center mb-4">
            <div class="flex gap-2">
                <button id="lb-btn" onclick="toggleLeaderboard()" class="bg-game-grid p-3 rounded-xl hover:brightness-95 active:scale-90 transition-all relative">
                    🏆
                    <div id="conn-dot" class="absolute top-1 right-1 w-2 h-2 rounded-full bg-red-500"></div>
                </button>
                <button onclick="toggleSettings()" class="bg-game-grid p-3 rounded-xl hover:brightness-95 active:scale-90 transition-all">⚙️</button>
                <button id="reset-btn" class="bg-game-grid p-3 rounded-xl hover:brightness-95 active:scale-90 transition-all">🔄</button>
            </div>
            <div class="flex flex-col items-end">
                <div class="text-[10px] font-bold px-3 py-1 rounded-full bg-indigo-500/10 text-indigo-600 dark:text-indigo-300">
                    🌐 Global High: <span id="global-best">0</span>
                </div>
                <div id="spawn-indicator" class="text-[9px] mt-1 font-black opacity-60 dark:text-white uppercase tracking-tighter">
                    Spawning: [2]
                </div>
            </div>
        </div>

        <!-- Game Board -->
        <div class="grid-container w-full aspect-square rounded-2xl p-3 shadow-2xl border-4 border-game-grid overflow-hidden">
            <div id="grid-bg" class="grid grid-cols-4 grid-rows-4 gap-3 h-full w-full"></div>
            <div id="tile-layer" class="absolute inset-3 pointer-events-none"></div>
            
            <div id="game-over" class="absolute inset-0 bg-white/95 dark:bg-black/95 backdrop-blur-md hidden flex-col items-center justify-center rounded-xl z-50 p-6 text-center">
                <h2 class="text-3xl font-black mb-1 dark:text-white">FLUX STALLED</h2>
                <p id="final-score-display" class="text-xl mb-6 text-indigo-600 font-bold italic"></p>
                
                <div class="w-full max-w-xs mb-6">
                    <label class="block text-[10px] uppercase font-black mb-2 opacity-60 text-left px-1 dark:text-white">Player Name</label>
                    <input type="text" id="player-name-input" maxlength="15" placeholder="Your Name" 
                        class="w-full p-4 rounded-xl bg-black/5 dark:bg-white/10 border-2 border-transparent focus:border-indigo-500 outline-none text-center font-bold text-lg dark:text-white transition-all shadow-inner">
                </div>

                <button id="submit-score-btn" class="bg-indigo-600 hover:bg-indigo-700 p-4 rounded-2xl text-white font-black text-xl shadow-xl active:scale-95 transition-all w-full max-w-xs flex items-center justify-center gap-2">
                    <span id="btn-text">SAVE & REBOOT</span>
                </button>
            </div>
        </div>

        <!-- Evolution Progress -->
        <div class="w-full mt-6 flex gap-2">
            <div id="mini-ach-reached_128" class="flex-1 h-2 rounded-full bg-game-grid opacity-30 transition-all"></div>
            <div id="mini-ach-reached_512" class="flex-1 h-2 rounded-full bg-game-grid opacity-30 transition-all"></div>
            <div id="mini-ach-reached_1024" class="flex-1 h-2 rounded-full bg-game-grid opacity-30 transition-all"></div>
            <div id="mini-ach-reached_2048" class="flex-1 h-2 rounded-full bg-game-grid opacity-30 transition-all"></div>
        </div>

        <!-- Leaderboard Modal -->
        <div id="leaderboard-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-6 backdrop-blur-md">
            <div class="bg-game-bg rounded-3xl w-full max-w-sm p-8 shadow-2xl flex flex-col max-h-[75vh]">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-black">Top Ranks</h3>
                    <button onclick="toggleLeaderboard()" class="text-3xl leading-none">&times;</button>
                </div>
                <div id="leaderboard-content" class="space-y-2 overflow-y-auto pr-2 min-h-[200px]">
                    <div class="p-8 text-center opacity-50 flex flex-col items-center gap-4">
                        <div class="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                        Accessing Cloud...
                    </div>
                </div>
                <button onclick="game.syncLeaderboard(true)" class="mt-4 text-[10px] uppercase font-bold text-indigo-500 py-2">Force Reconnect</button>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-6 backdrop-blur-md">
            <div class="bg-game-bg rounded-3xl w-full max-w-xs p-8 shadow-2xl border border-white/10">
                <h3 class="text-2xl font-black mb-8 dark:text-white">Settings</h3>
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <span class="font-bold">Dark Mode</span>
                        <button onclick="game.toggleTheme()" class="w-12 h-6 rounded-full bg-gray-300 dark:bg-indigo-500 relative transition-colors">
                            <div class="w-4 h-4 bg-white rounded-full absolute top-1 left-1 dark:left-7 transition-all"></div>
                        </button>
                    </div>
                </div>
                <button onclick="toggleSettings()" class="w-full mt-10 bg-game-grid py-4 rounded-2xl font-black">CLOSE</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, getDocs, query, limit, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fusion-flux-v6';

        class Game2048 {
            constructor() {
                this.grid = [];
                this.score = 0;
                this.bestScore = 0;
                this.user = null;
                this.userName = localStorage.getItem('ff_name_v2') || 'Fluxer';
                this.settings = { theme: 'light' };
                this.spawnLevel = 1;
                this.over = false;
                
                this.setupUI();
                this.initAuth();
            }

            setupUI() {
                const bg = document.getElementById('grid-bg');
                bg.innerHTML = '';
                for(let i=0; i<16; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'bg-black/[0.04] dark:bg-white/[0.06] rounded-lg h-full w-full';
                    bg.appendChild(cell);
                }
                
                document.getElementById('reset-btn').onclick = () => this.init();
                const nameInput = document.getElementById('player-name-input');
                nameInput.value = this.userName;
                nameInput.addEventListener('input', (e) => {
                    this.userName = e.target.value.trim() || 'Fluxer';
                    localStorage.setItem('ff_name_v2', this.userName);
                });

                document.getElementById('submit-score-btn').onclick = () => this.submitScoreAndRestart();
                this.setupSwipe();
                this.loadSettings();
            }

            async initAuth() {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    onAuthStateChanged(auth, user => {
                        if(user) {
                            this.user = user;
                            document.getElementById('conn-dot').classList.replace('bg-red-500', 'bg-green-500');
                            this.syncCloud();
                            this.init();
                        }
                    });
                } catch(e) {
                    console.error("Auth error", e);
                    this.init();
                }
            }

            syncCloud() {
                if(!this.user) return;
                
                // Global Best
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'global_stats'), s => {
                    if(s.exists()) document.getElementById('global-best').textContent = s.data().topScore || 0;
                });

                // Personal Stats
                onSnapshot(doc(db, 'artifacts', appId, 'users', this.user.uid, 'profile'), s => {
                    if(s.exists()) {
                        const d = s.data();
                        this.bestScore = d.bestScore || 0;
                        document.getElementById('best-score').textContent = this.bestScore;
                        (d.achievements || []).forEach(id => this.markAchievement(id));
                    }
                });
            }

            async syncLeaderboard(isManual = false) {
                const cont = document.getElementById('leaderboard-content');
                if(isManual) cont.innerHTML = `<div class="p-8 text-center animate-pulse">Retrying...</div>`;

                try {
                    const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard'));
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}))
                        .sort((a,b) => (b.score || 0) - (a.score || 0))
                        .slice(0, 15);

                    if(data.length === 0) {
                        cont.innerHTML = `<div class="p-8 text-center opacity-50">Board is empty.<br>Start the flux!</div>`;
                    } else {
                        cont.innerHTML = data.map((e, i) => `
                            <div class="flex justify-between items-center p-4 rounded-2xl ${this.user && e.id === this.user.uid ? 'bg-indigo-500/20 ring-2 ring-indigo-500' : 'bg-black/5 dark:bg-white/5'}">
                                <div class="flex items-center gap-3">
                                    <span class="text-xs font-black opacity-30">#${i+1}</span>
                                    <span class="font-bold truncate max-w-[140px] dark:text-white">${e.name || 'Anonymous'}</span>
                                </div>
                                <span class="font-black text-indigo-500 text-lg">${(e.score || 0).toLocaleString()}</span>
                            </div>
                        `).join('');
                    }
                } catch(e) {
                    cont.innerHTML = `<div class="p-8 text-center text-red-400">Connection Failed.<br><span class="text-[10px] opacity-50">Tap Reconnect Below</span></div>`;
                }
            }

            init() {
                this.grid = Array(4).fill().map(() => Array(4).fill(0));
                this.score = 0;
                this.over = false;
                this.spawnLevel = 1;
                document.getElementById('game-over').classList.add('hidden');
                document.getElementById('score').textContent = "0";
                this.updateSpawnIndicator();
                this.addRandom();
                this.addRandom();
                this.render();
            }

            addRandom() {
                const empty = [];
                this.grid.forEach((r, ri) => r.forEach((c, ci) => { if(c === 0) empty.push({r:ri, c:ci}) }));
                if(empty.length) {
                    const {r, c} = empty[Math.floor(Math.random()*empty.length)];
                    const base = Math.pow(2, this.spawnLevel);
                    this.grid[r][c] = Math.random() < 0.9 ? base : base * 2;
                }
            }

            updateSpawnIndicator() {
                const base = Math.pow(2, this.spawnLevel);
                document.getElementById('spawn-indicator').textContent = `Spawning: [${base}, ${base*2}]`;
            }

            render() {
                const layer = document.getElementById('tile-layer');
                layer.innerHTML = '';
                const size = layer.clientWidth;
                const cellSize = (size - 36) / 4;
                const gap = 12;

                this.grid.forEach((row, r) => row.forEach((val, c) => {
                    if(val > 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile tile-${val <= 2048 ? val : '2048'} tile-appear`;
                        tile.style.width = `${cellSize}px`;
                        tile.style.height = `${cellSize}px`;
                        tile.style.left = `${c * (cellSize + gap)}px`;
                        tile.style.top = `${r * (cellSize + gap)}px`;
                        tile.style.fontSize = val > 100 ? (val > 1000 ? '1.1rem' : '1.3rem') : '1.5rem';
                        tile.textContent = val;
                        layer.appendChild(tile);
                    }
                }));
            }

            move(dir) {
                if(this.over) return;
                let moved = false;
                let mergedPoints = 0;
                const rotate = (m) => m[0].map((_, i) => m.map(row => row[i]).reverse());
                let rotCount = {up:3, right:2, down:1, left:0}[dir];
                for(let i=0; i<rotCount; i++) this.grid = rotate(this.grid);

                for(let r=0; r<4; r++) {
                    let row = this.grid[r].filter(v => v !== 0);
                    for(let i=0; i<row.length-1; i++) {
                        if(row[i] === row[i+1]) {
                            row[i] *= 2;
                            mergedPoints += row[i];
                            row.splice(i+1, 1);
                            moved = true;
                        }
                    }
                    const newRow = row.concat(Array(4 - row.length).fill(0));
                    if(JSON.stringify(this.grid[r]) !== JSON.stringify(newRow)) moved = true;
                    this.grid[r] = newRow;
                }

                for(let i=0; i<(4-rotCount)%4; i++) this.grid = rotate(this.grid);

                if(moved) {
