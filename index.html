<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadblocks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121214;
            color: #f4f4f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #121214;
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 99px;
            border: 2px solid #121214;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }

        .game-card {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        background-color 0.2s ease, 
                        box-shadow 0.3s ease,
                        border-color 0.3s ease;
            background: #1a1a1e;
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: #222228;
            box-shadow: 0 16px 32px -12px rgba(0, 0, 0, 0.6);
        }

        .play-direct-btn {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s ease;
        }

        #global-banner {
            display: none;
            background-color: #2563eb;
            color: white;
            text-align: center;
            padding: 8px 16px;
            font-weight: 700;
            font-size: 0.85rem;
            z-index: 60;
            position: relative;
        }

        #game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 1000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(30, 30, 36, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
            z-index: 1001;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: #ef4444;
            color: white;
            transform: scale(1.1) rotate(90deg);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
        }

        main {
            flex: 1;
        }
    </style>
</head>
<body>

    <div id="global-banner"></div>

    <nav class="flex flex-col md:flex-row items-center justify-between px-8 py-5 bg-[#18181c] border-b border-white/5 sticky top-0 z-50 gap-4">
        <div class="flex items-center gap-3 shrink-0">
            <img src="https://github.com/Whale64/Roadblocks/raw/main/logo.png" alt="Roadblocks" class="h-9 w-9 object-contain" onerror="this.src='https://placehold.co/100x100/2563eb/ffffff?text=RB'">
            <span class="text-xl font-black tracking-tight text-white">ROADBLOCKS</span>
        </div>
        
        <div class="relative w-full max-w-md">
            <input type="text" id="search-input" placeholder="Search experiences..." class="w-full bg-[#121214] border border-white/10 rounded-full py-2 px-11 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/50 transition-all text-sm">
            <svg class="absolute left-4 top-2.5 text-zinc-500" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>

        <div class="hidden lg:flex gap-8 font-semibold text-zinc-400 shrink-0 text-sm">
            <a href="#" class="text-blue-400 hover:text-blue-300 transition-colors">Discover</a>
            <a href="https://ohioroadblocks.vercel.app/dev.html" target="_blank" class="hover:text-white transition-colors">Develop</a>
        </div>
        
        <div class="flex gap-4 items-center shrink-0">
            <div id="device-indicator" class="text-[10px] text-zinc-400 font-mono bg-white/5 px-2.5 py-1 rounded-md tracking-wider">DETECTING...</div>
            <div class="w-7 h-7 rounded-full bg-blue-600"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10 w-full">
        
        <div id="featured-section-container" class="hidden mb-12">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-extrabold tracking-tight text-white flex items-center gap-2">
                    <span class="w-1.5 h-6 bg-amber-500 rounded-full"></span>Featured Experiences
                </h2>
            </div>
            <div id="featured-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                <!-- Loaded Dynamically -->
            </div>
        </div>

        <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl font-extrabold tracking-tight text-white flex items-center gap-2" id="view-title">
                <span class="w-1.5 h-6 bg-blue-500 rounded-full"></span>Experiences
            </h1>
        </div>
        
        <div id="status-container"></div>

        <div id="experience-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
            <!-- Initial Loading Skeletons -->
        </div>

        <div id="load-more-trigger"></div>
    </main>

    <div id="details-modal" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="absolute inset-0 cursor-default" onclick="closeDetailsModal()"></div>
        
        <div class="relative bg-[#18181c] border border-white/5 max-w-md w-full rounded-3xl overflow-hidden shadow-2xl p-6 z-10">
            <button onclick="closeDetailsModal()" class="absolute top-4 right-4 text-zinc-400 hover:text-white transition-colors focus:outline-none bg-white/5 hover:bg-white/10 p-2 rounded-full">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
            </button>

            <div class="flex flex-col items-center text-center mt-2">
                <div class="w-20 h-20 rounded-2xl overflow-hidden bg-[#121214] border border-white/10 shadow-md mb-4">
                    <img id="modal-icon" src="" alt="Icon" class="w-full h-full object-cover">
                </div>

                <div class="w-full">
                    <h2 id="modal-title" class="text-xl font-extrabold text-white tracking-tight truncate px-2">Game Title</h2>
                    <p class="text-xs text-zinc-400 mt-1">
                        By <span id="modal-developer" class="text-blue-400 font-bold">Developer</span>
                    </p>
                </div>

                <div class="w-full border-t border-white/5 my-4 pt-4 text-left">
                    <p id="modal-description" class="text-sm text-zinc-300 leading-relaxed max-h-36 overflow-y-auto pr-1 whitespace-pre-wrap">Loading info...</p>
                </div>

                <div class="w-full flex flex-col gap-2 mt-2">
                    <button id="modal-play-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-extrabold py-3 px-6 rounded-2xl flex items-center justify-center gap-2 transition-all text-sm tracking-wide active:scale-95">
                        <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        Play Now
                    </button>
                    <button onclick="closeDetailsModal()" class="w-full bg-white/5 hover:bg-white/10 text-zinc-400 hover:text-white font-bold py-2.5 px-5 rounded-2xl transition-colors text-xs">
                        Go Back
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="w-full py-8 px-8 border-t border-white/5 bg-[#121214] text-center text-zinc-500 text-xs space-y-2 relative z-10">
        <p>Made by <a href="https://whale64.net" target="_blank" class="text-white hover:text-blue-400 transition-colors font-semibold">Whale64</a></p>
        <p>Roadblocks is <a href="https://github.com/Whale64/Roadblocks" target="_blank" class="text-blue-400 hover:text-blue-300 transition-colors font-medium">Open Source</a></p>
    </footer>

    <div id="game-overlay">
        <div class="close-btn" onclick="closeGame()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        const REPO_OWNER = "Whale64";
        const REPO_NAME = "Roadblocks";
        const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;
        const RAW_URL = `https://raw.githubusercontent.com/Whale64/${REPO_NAME}/main`;
        const PAGES_URL = `https://ohioroadblocks.vercel.app`;

        const grid = document.getElementById('experience-grid');
        const featuredGrid = document.getElementById('featured-grid');
        const featuredContainer = document.getElementById('featured-section-container');
        
        const statusContainer = document.getElementById('status-container');
        const overlay = document.getElementById('game-overlay');
        const frame = document.getElementById('game-frame');
        const deviceIndicator = document.getElementById('device-indicator');
        const loadMoreTrigger = document.getElementById('load-more-trigger');
        const searchInput = document.getElementById('search-input');
        const viewTitle = document.getElementById('view-title');
        const globalBanner = document.getElementById('global-banner');

        const detailsModal = document.getElementById('details-modal');
        const modalIcon = document.getElementById('modal-icon');
        const modalTitle = document.getElementById('modal-title');
        const modalDeveloper = document.getElementById('modal-developer');
        const modalDescription = document.getElementById('modal-description');
        const modalPlayBtn = document.getElementById('modal-play-btn');

        let allFilteredFolders = []; 
        let currentDisplayFolders = []; 
        let currentIndex = 0;
        const ITEMS_PER_PAGE = 20;
        let isLoading = false;
        
        const cacheBust = Date.now();

        function getDeviceType() {
            const ua = navigator.userAgent;
            if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) return "mobile";
            if (/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Silk-Accelerated|(hpw|web)OS|Opera M(obi|ini)/.test(ua)) return "mobile";
            return "pc";
        }

        const currentPlatform = getDeviceType();
        deviceIndicator.textContent = `${currentPlatform.toUpperCase()} DETECTED`;

        async function checkGlobalBanner() {
            try {
                const response = await fetch(`${RAW_URL}/banner.txt?v=${cacheBust}`);
                if (response.ok) {
                    const text = await response.text();
                    if (text && text.trim() !== "") {
                        globalBanner.textContent = text.trim();
                        globalBanner.style.display = 'block';
                    }
                }
            } catch (e) {}
        }

        async function checkDeviceSupport(folderName) {
            try {
                const response = await fetch(`${RAW_URL}/${folderName}/device.txt?v=${cacheBust}`);
                if (!response.ok) return true; 
                const rawText = await response.text();
                if (!rawText || rawText.trim() === "") return true;
                const supportedPlatforms = rawText.toLowerCase().split(',').map(item => item.trim()).filter(item => item !== "");
                return supportedPlatforms.includes(currentPlatform);
            } catch (e) { return true; }
        }

        async function isFeatured(folderName) {
            try {
                const response = await fetch(`${RAW_URL}/${folderName}/featured.txt?v=${cacheBust}`);
                return response.ok;
            } catch (e) { return false; }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showSkeletons() {
            const skeletons = Array(5).fill(0).map(() => `
                <div class="animate-pulse bg-[#1a1a1e]/60 border border-white/5 p-3 rounded-2xl skeleton-item">
                    <div class="aspect-square bg-white/5 rounded-xl mb-3"></div>
                    <div class="h-4 bg-white/5 w-3/4 rounded mx-1"></div>
                </div>
            `).join('');
            grid.insertAdjacentHTML('beforeend', skeletons);
        }

        function removeSkeletons() {
            const skeletons = document.querySelectorAll('.skeleton-item');
            skeletons.forEach(s => s.remove());
        }

        async function fetchExperiences() {
            if (isLoading) return;
            isLoading = true;
            showSkeletons();

            checkGlobalBanner();

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Failed to fetch repository contents');
                
                const contents = await response.json();
                const folders = contents.filter(item => 
                    item.type === 'dir' && 
                    !item.name.startsWith('#') && 
                    !item.name.startsWith('?')
                );
                
                const metadataPromises = folders.map(async (folder) => {
                    const isSupported = await checkDeviceSupport(folder.name);
                    if (isSupported) {
                        const featured = await isFeatured(folder.name);
                        return { ...folder, featured };
                    }
                    return null;
                });

                const results = await Promise.all(metadataPromises);
                allFilteredFolders = results.filter(f => f !== null);

                const featuredExperiences = allFilteredFolders.filter(f => f.featured);
                const normalExperiences = allFilteredFolders.filter(f => !f.featured);

                const shuffledNormal = shuffleArray(normalExperiences);

                removeSkeletons();
                isLoading = false;

                if (featuredExperiences.length > 0) {
                    featuredContainer.classList.remove('hidden');
                    renderFeaturedExperiences(featuredExperiences);
                } else {
                    featuredContainer.classList.add('hidden');
                }

                currentDisplayFolders = [...shuffledNormal];

                if (currentDisplayFolders.length === 0 && featuredExperiences.length === 0) {
                    statusContainer.innerHTML = `<div class="text-zinc-400 text-center py-8 bg-[#1a1a1e] border border-white/5 rounded-2xl">No experiences available for your device type.</div>`;
                    return;
                }

                loadNextBatch();

            } catch (error) {
                console.error(error);
                removeSkeletons();
                isLoading = false;
                statusContainer.innerHTML = `<div class="error-msg"><strong>Error:</strong> Could not connect to the Roadblocks API.</div>`;
            }
        }

        function loadNextBatch() {
            if (currentIndex >= currentDisplayFolders.length) return;
            const nextBatch = currentDisplayFolders.slice(currentIndex, currentIndex + ITEMS_PER_PAGE);
            renderExperiences(nextBatch);
            currentIndex += ITEMS_PER_PAGE;
        }

        function handleImageError(img, folderName, formatsIndex) {
            const formats = ['png', 'jpg', 'jpeg', 'webp'];
            if (formatsIndex < formats.length - 1) {
                const nextIndex = formatsIndex + 1;
                img.src = `${RAW_URL}/${folderName}/icon.${formats[nextIndex]}?v=${cacheBust}`;
                img.setAttribute('data-format-index', nextIndex);
            } else {
                img.src = `https://placehold.co/400x400/1e1e24/ffffff?text=${encodeURIComponent(folderName)}`;
                img.onerror = null;
            }
        }

        function renderFeaturedExperiences(folders) {
            featuredGrid.innerHTML = '';
            folders.forEach(folder => {
                const card = document.createElement('div');
                card.className = 'game-card border border-white/5 p-4 rounded-3xl cursor-pointer group flex flex-col justify-between h-full relative';
                
                const displayName = folder.name.replace(/([A-Z])/g, ' $1').trim();
                const initialIconUrl = `${RAW_URL}/${folder.name}/icon.png?v=${cacheBust}`;
                const gameUrl = `${PAGES_URL}/${folder.name}/game.html`;

                card.innerHTML = `
                    <div class="relative aspect-[4/3] overflow-hidden rounded-2xl bg-[#121214] mb-3">
                        <img src="${initialIconUrl}" 
                             alt="${displayName}" 
                             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300 ease-out"
                             loading="lazy"
                             data-format-index="0">
                        
                        <div class="absolute top-3 left-3 z-10 flex items-center gap-1.5 bg-amber-500 text-neutral-950 text-[10px] font-extrabold uppercase px-2.5 py-1.5 rounded-full shadow-md">
                            <svg class="w-3 h-3 fill-current" viewBox="0 0 24 24">
                                <path d="M18 2H6a2 2 0 0 0-2 2v3c0 3.31 2.69 6 6 6h4c3.31 0 6-2.69 6-6V4a2 2 0 0 0-2-2zM4 6V4h2v5.17A4 4 0 0 1 4 6zm16 3.17A4 4 0 0 1 18 6V4h2v2zM12 15c-3.31 0-6 2.69-6 6v1h12v-1c0-3.31-2.69-6-6-6z"/>
                            </svg>
                            FEATURED
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between gap-3 mt-1">
                        <div class="min-w-0 flex-1">
                            <p class="font-extrabold text-base truncate text-zinc-100 group-hover:text-amber-400 transition-colors" title="${displayName}">${displayName}</p>
                            <p class="text-xs text-zinc-400 truncate mt-0.5 feat-creator">By Creator</p>
                        </div>
                        
                        <button class="play-direct-btn shrink-0 bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-xl flex items-center justify-center shadow-lg active:scale-90 hover:scale-105 transition-all">
                            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                    </div>
                `;

                // Programmatically bind image onError to avoid quote and space breaks
                const img = card.querySelector('img');
                img.onerror = () => handleImageError(img, folder.name, 0);

                // Safe programmatic querySelector mapping for the direct creator fetch
                const creatorLabel = card.querySelector('.feat-creator');
                fetch(`${RAW_URL}/${folder.name}/developer.txt?v=${cacheBust}`)
                    .then(res => { if (res.ok) return res.text(); throw new Error(); })
                    .then(text => {
                        if (creatorLabel) creatorLabel.textContent = `By ${ (text && text.trim() !== "") ? text.trim() : "Community Creator" }`;
                    })
                    .catch(() => {
                        if (creatorLabel) creatorLabel.textContent = "By Community Creator";
                    });

                card.onclick = () => openDetailsModal(folder, displayName, initialIconUrl, gameUrl);

                // Programmatic direct play button handling
                const playBtn = card.querySelector('.play-direct-btn');
                playBtn.onclick = (e) => {
                    e.stopPropagation();
                    launchGame(gameUrl);
                };

                featuredGrid.appendChild(card);
            });
        }

        function renderExperiences(folders) {
            folders.forEach(folder => {
                const card = document.createElement('div');
                card.className = 'game-card border border-white/5 p-3 rounded-2xl cursor-pointer group flex flex-col justify-between h-full';
                
                const displayName = folder.name.replace(/([A-Z])/g, ' $1').trim();
                const initialIconUrl = `${RAW_URL}/${folder.name}/icon.png?v=${cacheBust}`;
                const gameUrl = `${PAGES_URL}/${folder.name}/game.html`;

                card.innerHTML = `
                    <div class="relative aspect-square overflow-hidden rounded-xl bg-[#121214] mb-3">
                        <img src="${initialIconUrl}" 
                             alt="${displayName}" 
                             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300 ease-out"
                             loading="lazy"
                             data-format-index="0">
                    </div>
                    <p class="font-extrabold text-sm truncate px-1 text-zinc-100 group-hover:text-blue-400 transition-colors" title="${displayName}">${displayName}</p>
                `;

                const img = card.querySelector('img');
                img.onerror = () => handleImageError(img, folder.name, 0);

                card.onclick = () => openDetailsModal(folder, displayName, initialIconUrl, gameUrl);
                grid.appendChild(card);
            });
        }

        async function openDetailsModal(folder, displayName, iconUrl, gameUrl) {
            modalTitle.textContent = displayName;
            modalIcon.src = iconUrl;
            
            modalIcon.setAttribute('data-format-index', "0");
            modalIcon.onerror = function() {
                handleImageError(this, folder.name, parseInt(this.getAttribute('data-format-index')));
            };

            modalDeveloper.textContent = "Loading...";
            modalDescription.textContent = "Fetching game details...";

            detailsModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            fetch(`${RAW_URL}/${folder.name}/developer.txt?v=${cacheBust}`)
                .then(res => { if (res.ok) return res.text(); throw new Error(); })
                .then(text => {
                    modalDeveloper.textContent = (text && text.trim() !== "") ? text.trim() : "Community Creator";
                })
                .catch(() => {
                    modalDeveloper.textContent = "Community Creator";
                });

            fetch(`${RAW_URL}/${folder.name}/description.txt?v=${cacheBust}`)
                .then(res => { if (res.ok) return res.text(); throw new Error(); })
                .then(text => {
                    modalDescription.textContent = (text && text.trim() !== "") ? text.trim() : "Launch and enjoy this experience directly in your browser window!";
                })
                .catch(() => {
                    modalDescription.textContent = "Launch and enjoy this experience directly in your browser window!";
                });

            modalPlayBtn.onclick = () => {
                closeDetailsModal();
                launchGame(gameUrl);
            };
        }

        function closeDetailsModal() {
            detailsModal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (query === "") {
                const featuredExperiences = allFilteredFolders.filter(f => f.featured);
                if (featuredExperiences.length > 0) {
                    featuredContainer.classList.remove('hidden');
                }
                currentDisplayFolders = allFilteredFolders.filter(f => !f.featured);
                viewTitle.innerHTML = `<span class="w-1.5 h-6 bg-blue-500 rounded-full"></span>Experiences`;
            } else {
                featuredContainer.classList.add('hidden');
                currentDisplayFolders = allFilteredFolders.filter(folder => {
                    const readableName = folder.name.replace(/([A-Z])/g, ' $1').toLowerCase();
                    return folder.name.toLowerCase().includes(query) || readableName.includes(query);
                });
                viewTitle.innerHTML = `<span class="w-1.5 h-6 bg-blue-500 rounded-full"></span>Results for "${query}"`;
            }

            grid.innerHTML = '';
            currentIndex = 0;
            
            if (currentDisplayFolders.length === 0) {
                statusContainer.innerHTML = `<div class="text-zinc-500 py-10 text-center border border-white/5 rounded-2xl bg-[#1a1a1e]/50">No experiences match your search query.</div>`;
            } else {
                statusContainer.innerHTML = '';
                loadNextBatch();
            }
        });

        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isLoading && currentIndex < currentDisplayFolders.length) {
                loadNextBatch();
            }
        }, { threshold: 0.1 });

        observer.observe(loadMoreTrigger);

        function launchGame(url) {
            frame.src = url;
            overlay.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeGame() {
            overlay.style.display = 'none';
            frame.src = 'about:blank';
            document.body.style.overflow = 'auto';
        }

        window.onload = fetchExperiences;
    </script>
</body>
</html>
