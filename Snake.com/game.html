<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>snake.com | Multiplayer Slither</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .interactive {
            pointer-events: auto;
        }
        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            overflow: hidden;
        }
        #joystick-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: none; /* Only show on touch */
        }
        #joystick-knob {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            top: 35px;
            left: 35px;
        }
        @media (pointer: coarse) {
            #joystick-container { display: block; }
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<div id="ui-layer">
    <!-- Top Right: Leaderboard -->
    <div class="absolute top-5 right-5 bg-black/50 p-4 rounded-lg border border-white/10 text-white min-w-[150px]">
        <h3 class="font-bold border-bottom border-white/20 mb-2">Leaderboard</h3>
        <ul id="leaderboard" class="text-sm space-y-1">
            <li>Loading...</li>
        </ul>
    </div>

    <!-- Top Left: Stats -->
    <div class="absolute top-5 left-5 text-white drop-shadow-md">
        <div id="score-display" class="text-2xl font-black italic">Length: 0</div>
        <div id="rank-display" class="text-sm opacity-80">Rank: - / -</div>
    </div>

    <!-- Bottom Right: Minimap -->
    <div id="minimap">
        <canvas id="minimap-canvas" width="150" height="150"></canvas>
    </div>

    <!-- Mobile Controls -->
    <div id="joystick-container" class="interactive">
        <div id="joystick-knob"></div>
    </div>
</div>

<!-- Start Screen -->
<div id="start-screen" class="overlay interactive">
    <div class="bg-zinc-900 p-8 rounded-2xl border-4 border-emerald-500 shadow-2xl max-w-md w-full text-center">
        <h1 class="text-5xl font-black text-emerald-500 mb-6 italic tracking-tighter">SNAKE.COM</h1>
        <div id="key-warning" class="hidden mb-4 p-3 bg-red-900/50 border border-red-500 text-red-200 text-sm rounded">
            Supabase Key is missing. Live play disabled.
        </div>
        <input type="text" id="nickname" placeholder="Nickname" maxlength="15" class="w-full p-4 rounded bg-zinc-800 text-white border border-zinc-700 mb-4 focus:outline-none focus:border-emerald-500 text-xl text-center">
        <button id="play-btn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black p-4 rounded text-2xl transition-all transform hover:scale-105 active:scale-95">
            PLAY
        </button>
        <p class="text-zinc-500 mt-6 text-sm">
            Move with Mouse/Arrow Keys<br>
            Hold Space to Boost
        </p>
    </div>
</div>

<script>
/**
 * CONFIGURATION & INITIALIZATION
 */
const SUPABASE_URL = "https://xizjowjuapsoiskynzun.supabase.co";
const SUPABASE_KEY = "PROCESS_REPLACE_SUPABASE_KEY";

let sbClient = null;

// Only initialize if key is present to avoid the "supabaseKey is required" error
if (SUPABASE_KEY && SUPABASE_KEY.trim() !== "") {
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} else {
    console.warn("Supabase Key is missing. Game will run in offline/local-only mode.");
    document.getElementById('key-warning').classList.remove('hidden');
}

const WORLD_SIZE = 4000;
const INITIAL_LENGTH = 10;
const GRID_SIZE = 50;
const BASE_SPEED = 3.5;
const BOOST_SPEED = 6.5;

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx = mmCanvas.getContext('2d');

let width, height;
let myId = Math.random().toString(36).substring(2, 15);
let nickname = "Anonymous";
let isPlaying = false;
let camera = { x: 0, y: 0 };

// Game State
let players = {}; // { id: { x, y, angle, segments: [{x, y}], color, name, score } }
let foods = [];   // [{x, y, size, color}]
let localPlayer = {
    x: Math.random() * WORLD_SIZE,
    y: Math.random() * WORLD_SIZE,
    angle: Math.random() * Math.PI * 2,
    segments: [],
    color: `hsl(${Math.random() * 360}, 70%, 50%)`,
    score: 0,
    isBoosting: false
};

// Controls
let mouse = { x: 0, y: 0 };
let inputAngle = 0;

/**
 * UTILS
 */
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function getDistance(x1, y1, x2, y2) {
    return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
}

/**
 * MULTIPLAYER LOGIC (SUPABASE REALTIME)
 */
let channel;

async function initMultiplayer() {
    if (!sbClient) return; // Skip if client not initialized

    channel = sbClient.channel('snake_world', {
        config: { broadcast: { self: false } }
    });

    channel.on('broadcast', { event: 'player_move' }, ({ payload }) => {
        players[payload.id] = payload;
        players[payload.id].lastUpdate = Date.now();
    });

    channel.on('broadcast', { event: 'player_leave' }, ({ payload }) => {
        delete players[payload.id];
    });

    // We periodically broadcast local state
    await channel.subscribe();
}

function broadcastState() {
    if (!isPlaying || !channel || !sbClient) return;
    channel.send({
        type: 'broadcast',
        event: 'player_move',
        payload: {
            id: myId,
            name: nickname,
            x: localPlayer.x,
            y: localPlayer.y,
            angle: localPlayer.angle,
            segments: localPlayer.segments,
            color: localPlayer.color,
            score: localPlayer.score
        }
    });
}

/**
 * GAME LOGIC
 */
function initFoods() {
    for (let i = 0; i < 300; i++) {
        foods.push({
            x: Math.random() * WORLD_SIZE,
            y: Math.random() * WORLD_SIZE,
            size: Math.random() * 5 + 3,
            color: `hsl(${Math.random() * 360}, 100%, 70%)`
        });
    }
}

function spawnPlayer() {
    nickname = document.getElementById('nickname').value || "Snake";
    localPlayer.x = Math.random() * WORLD_SIZE;
    localPlayer.y = Math.random() * WORLD_SIZE;
    localPlayer.segments = [];
    localPlayer.score = INITIAL_LENGTH;
    for (let i = 0; i < INITIAL_LENGTH; i++) {
        localPlayer.segments.push({ x: localPlayer.x, y: localPlayer.y });
    }
    isPlaying = true;
    document.getElementById('start-screen').style.display = 'none';
}

function update() {
    if (!isPlaying) return;

    // Movement
    let dx = mouse.x - width / 2;
    let dy = mouse.y - height / 2;
    let targetAngle = Math.atan2(dy, dx);
    
    // Smooth angle rotation
    let angleDiff = targetAngle - localPlayer.angle;
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    localPlayer.angle += angleDiff * 0.15;

    let speed = localPlayer.isBoosting ? BOOST_SPEED : BASE_SPEED;
    localPlayer.x += Math.cos(localPlayer.angle) * speed;
    localPlayer.y += Math.sin(localPlayer.angle) * speed;

    // Boundary check
    if (localPlayer.x < 0) localPlayer.x = 0;
    if (localPlayer.x > WORLD_SIZE) localPlayer.x = WORLD_SIZE;
    if (localPlayer.y < 0) localPlayer.y = 0;
    if (localPlayer.y > WORLD_SIZE) localPlayer.y = WORLD_SIZE;

    // Update segments
    localPlayer.segments.unshift({ x: localPlayer.x, y: localPlayer.y });
    if (localPlayer.segments.length > localPlayer.score * 3) {
        localPlayer.segments.pop();
    }

    // Food collision
    for (let i = foods.length - 1; i >= 0; i--) {
        if (getDistance(localPlayer.x, localPlayer.y, foods[i].x, foods[i].y) < 20) {
            localPlayer.score += 0.5;
            foods.splice(i, 1);
            // Respawn food
            foods.push({
                x: Math.random() * WORLD_SIZE,
                y: Math.random() * WORLD_SIZE,
                size: Math.random() * 5 + 3,
                color: `hsl(${Math.random() * 360}, 100%, 70%)`
            });
        }
    }

    // Camera follow
    camera.x = localPlayer.x;
    camera.y = localPlayer.y;

    // Clean up disconnected players (older than 2s)
    let now = Date.now();
    for (let id in players) {
        if (now - players[id].lastUpdate > 2000) delete players[id];
    }
}

/**
 * RENDERING
 */
function draw() {
    ctx.clearRect(0, 0, width, height);

    let offX = width / 2 - camera.x;
    let offY = height / 2 - camera.y;

    // Draw Grid
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 1;
    for (let x = 0; x <= WORLD_SIZE; x += GRID_SIZE) {
        ctx.beginPath();
        ctx.moveTo(x + offX, offY);
        ctx.lineTo(x + offX, WORLD_SIZE + offY);
        ctx.stroke();
    }
    for (let y = 0; y <= WORLD_SIZE; y += GRID_SIZE) {
        ctx.beginPath();
        ctx.moveTo(offX, y + offY);
        ctx.lineTo(WORLD_SIZE + offX, y + offY);
        ctx.stroke();
    }

    // Draw Food
    foods.forEach(f => {
        // Culling
        if (f.x + offX < -20 || f.x + offX > width + 20 || f.y + offY < -20 || f.y + offY > height + 20) return;
        ctx.fillStyle = f.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = f.color;
        ctx.beginPath();
        ctx.arc(f.x + offX, f.y + offY, f.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    });

    // Draw Other Players
    Object.values(players).forEach(p => {
        drawSnake(ctx, p, offX, offY);
    });

    // Draw Local Player
    if (isPlaying) {
        drawSnake(ctx, localPlayer, offX, offY, true);
        updateUI();
    }

    drawMinimap();
    requestAnimationFrame(draw);
}

function drawSnake(c, p, offX, offY, isLocal = false) {
    c.lineWidth = 15;
    c.lineCap = 'round';
    c.lineJoin = 'round';
    c.strokeStyle = p.color;

    c.beginPath();
    // We only draw every 3rd segment point for performance/spacing
    if (p.segments.length > 0) {
        c.moveTo(p.segments[0].x + offX, p.segments[0].y + offY);
        for (let i = 1; i < p.segments.length; i += 3) {
            c.lineTo(p.segments[i].x + offX, p.segments[i].y + offY);
        }
        c.stroke();
    }

    // Draw Head
    c.fillStyle = '#fff';
    c.beginPath();
    c.arc(p.x + offX, p.y + offY, 12, 0, Math.PI * 2);
    c.fill();
    
    // Draw Name
    c.fillStyle = 'white';
    c.font = '14px Arial';
    c.textAlign = 'center';
    c.fillText(p.name || 'Snake', p.x + offX, p.y + offY - 25);
}

function drawMinimap() {
    mmCtx.fillStyle = 'rgba(0,0,0,0.5)';
    mmCtx.fillRect(0, 0, 150, 150);

    const scale = 150 / WORLD_SIZE;
    
    // Players dots
    mmCtx.fillStyle = 'red';
    Object.values(players).forEach(p => {
        mmCtx.fillRect(p.x * scale, p.y * scale, 2, 2);
    });

    if (isPlaying) {
        mmCtx.fillStyle = 'white';
        mmCtx.beginPath();
        mmCtx.arc(localPlayer.x * scale, localPlayer.y * scale, 3, 0, Math.PI * 2);
        mmCtx.fill();
    }
}

function updateUI() {
    document.getElementById('score-display').innerText = `Length: ${Math.floor(localPlayer.score)}`;
    
    // Basic Leaderboard sort
    let sorted = Object.values(players);
    sorted.push({ name: nickname, score: localPlayer.score, id: myId });
    sorted.sort((a, b) => b.score - a.score);

    let lbHTML = sorted.slice(0, 10).map((p, i) => `
        <li class="${p.id === myId ? 'text-emerald-400 font-bold' : ''}">
            ${i+1}. ${p.name.substring(0, 10)}: ${Math.floor(p.score)}
        </li>
    `).join('');
    document.getElementById('leaderboard').innerHTML = lbHTML;

    let myRank = sorted.findIndex(p => p.id === myId) + 1;
    document.getElementById('rank-display').innerText = `Rank: ${myRank} / ${sorted.length}`;
}

/**
 * INPUT HANDLING
 */
window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

window.addEventListener('keydown', e => {
    if (e.code === 'Space') localPlayer.isBoosting = true;
});

window.addEventListener('keyup', e => {
    if (e.code === 'Space') localPlayer.isBoosting = false;
});

// Mobile Joystick
const joystick = document.getElementById('joystick-container');
const knob = document.getElementById('joystick-knob');
joystick.addEventListener('touchstart', handleTouch);
joystick.addEventListener('touchmove', handleTouch);
joystick.addEventListener('touchend', () => {
    knob.style.transform = `translate(0px, 0px)`;
    localPlayer.isBoosting = false;
});

function handleTouch(e) {
    e.preventDefault();
    const rect = joystick.getBoundingClientRect();
    const touch = e.touches[0];
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    
    let jdx = touch.clientX - centerX;
    let jdy = touch.clientY - centerY;
    const dist = Math.min(60, Math.sqrt(jdx*jdx + jdy*jdy));
    const angle = Math.atan2(jdy, jdx);
    
    knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
    
    // Fake mouse position for movement logic
    mouse.x = width/2 + Math.cos(angle) * 100;
    mouse.y = height/2 + Math.sin(angle) * 100;
    
    if (dist > 45) localPlayer.isBoosting = true;
    else localPlayer.isBoosting = false;
}

/**
 * MAIN LOOP
 */
document.getElementById('play-btn').onclick = spawnPlayer;

initFoods();
initMultiplayer();

// Core loop intervals
setInterval(update, 1000/60); // 60fps logic
setInterval(broadcastState, 100); // 10hz network
draw(); // Raf drawing

</script>
</body>
</html>
