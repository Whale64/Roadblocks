<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Global Capital Hopper</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #ui {
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: bold;
            display: flex;
            gap: 10px;
            justify-content: center;
            width: 95%;
            max-width: 800px;
        }
        .ui-element {
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 12px;
            border-radius: 5px;
            border: 1px solid #444;
        }
        #city-box { color: #5adbb5; font-size: 18px; flex-grow: 1; text-align: center; }
        #death-box { color: #ff4757; }
        #coin-box { color: #ffd32a; }
        
        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 2 / 1;
        }
        canvas {
            width: 100%;
            height: 100%;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            display: block;
        }
        #controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            padding: 15px 20px;
            box-sizing: border-box;
        }
        .d-pad { display: flex; gap: 15px; }
        .btn {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            color: white;
            touch-action: manipulation;
        }
        .btn:active { background: rgba(255, 255, 255, 0.5); }
        #jump-btn { background: rgba(255, 71, 87, 0.4); border-color: #ff4757; }
        #jump-btn:active { background: rgba(255, 71, 87, 0.7); }
        
        @media (min-width: 801px) {
            #controls { display: none; }
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="ui-element" id="city-box">📍 Lvl <span id="level-num">1</span>/20: <span id="city-name">Loading...</span></div>
        <div class="ui-element" id="coin-box">Coins: <span id="coins">0</span></div>
        <div class="ui-element" id="death-box">Deaths: <span id="deaths">0</span></div>
    </div>
    
    <div id="canvas-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <div id="controls">
        <div class="d-pad">
            <div class="btn" id="left-btn">←</div>
            <div class="btn" id="right-btn">→</div>
        </div>
        <div class="btn" id="jump-btn">↑</div>
    </div>

function getLevel() {
    return levels[currentLevelIndex];
}

function updateLevelUI() {
    const lvl = getLevel();
    levelNumElement.innerText = currentLevelIndex + 1;
    cityNameElement.innerText = lvl.name;
    canvas.style.background = lvl.skyColor;
}

// Controls configuration
window.addEventListener("keydown", (e) => {
    if (e.code === "ArrowLeft" || e.code === "KeyA") inputs.left = true;
    if (e.code === "ArrowRight" || e.code === "KeyD") inputs.right = true;
    if (e.code === "ArrowUp" || e.code === "KeyW" || e.code === "Space") inputs.jump = true;
});

window.addEventListener("keyup", (e) => {
    if (e.code === "ArrowLeft" || e.code === "KeyA") inputs.left = false;
    if (e.code === "ArrowRight" || e.code === "KeyD") inputs.right = false;
    if (e.code === "ArrowUp" || e.code === "KeyW" || e.code === "Space") inputs.jump = false;
});

function setupMobileButton(elementId, inputProperty) {
    const btn = document.getElementById(elementId);
    btn.addEventListener("touchstart", (e) => { e.preventDefault(); inputs[inputProperty] = true; }, { passive: false });
    btn.addEventListener("touchend", (e) => { e.preventDefault(); inputs[inputProperty] = false; }, { passive: false });
    btn.addEventListener("touchcancel", (e) => { e.preventDefault(); inputs[inputProperty] = false; }, { passive: false });
}
setupMobileButton("left-btn", "left");
setupMobileButton("right-btn", "right");
setupMobileButton("jump-btn", "jump");

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

function handleDeath() {
    deathCount++;
    deathsElement.innerText = deathCount;
    resetPlayerPosition();
}

function resetPlayerPosition() {
    const lvl = getLevel();
    if (lvl.spawnLeft) {
        player.x = 60;
    } else {
        player.x = 710;
    }
    player.y = 100;
    player.vx = 0;
    player.vy = 0;
    player.grounded = false;
}

function advanceLevel() {
    currentLevelIndex++;
    if (currentLevelIndex >= levels.length) {
        currentLevelIndex = 0; // Loop back to level 1 after level 20
    }
    updateLevelUI();
    resetPlayerPosition();
}

function update() {
    const currentLevel = getLevel();

    if (inputs.left) player.vx = -player.speed;
    else if (inputs.right) player.vx = player.speed;
    else player.vx = 0;

    if (inputs.jump && player.grounded) {
        player.vy = -player.jumpForce;
        player.grounded = false;
    }

    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

    player.grounded = false;
    for (let plat of currentLevel.platforms) {
        if (checkCollision(player, plat)) {
            if (player.vy > 0 && player.y + player.height - player.vy <= plat.y) {
                player.y = plat.y - player.height;
                player.vy = 0;
                player.grounded = true;
            }
            else if (player.vy < 0 && player.y - player.vy >= plat.y + plat.height) {
                player.y = plat.y + plat.height;
                player.vy = 0;
            }
        }
    }

    for (let coin of currentLevel.coins) {
        if (!coin.collected) {
            let coinBox = { x: coin.x - coin.radius, y: coin.y - coin.radius, width: coin.radius * 2, height: coin.radius * 2 };
            if (checkCollision(player, coinBox)) {
                coin.collected = true;
                coinCount++;
                coinsElement.innerText = coinCount;
            }
        }
    }

    if (checkCollision(player, currentLevel.portal)) {
        advanceLevel();
        return;
    }

    if (player.y > canvas.height) {
        handleDeath();
    }

    portalAngle += 0.05;
}

function draw() {
    const currentLevel = getLevel();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Platforms
    for (let plat of currentLevel.platforms) {
        ctx.fillStyle = currentLevel.platformColor; 
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        ctx.fillStyle = currentLevel.accentColor;
        ctx.fillRect(plat.x, plat.y + 8, plat.width, plat.height - 8);
    }

    // Coins
    ctx.fillStyle = "#ffd32a";
    for (let coin of currentLevel.coins) {
        if (!coin.collected) {
            ctx.beginPath();
            ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Portal
    const p = currentLevel.portal;
    const centerX = p.x + p.width / 2;
    const centerY = p.y + p.height / 2;
    
    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(portalAngle);
    
    ctx.fillStyle = "#a29bfe";
    ctx.beginPath();
    ctx.ellipse(0, 0, p.width / 1.1, p.height / 1.1, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#6c5ce7";
    ctx.beginPath();
    ctx.ellipse(0, 0, p.width / 1.4, p.height / 1.4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();

    // Player
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    
    ctx.fillStyle = "#111";
    let eyeOffset = player.vx >= 0 ? 16 : 4;
    ctx.fillRect(player.x + eyeOffset, player.y + 8, 5, 5);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

updateLevelUI();
resetPlayerPosition();
gameLoop();
</script>
