<!DOCTYPE html>
<html>
<head>
    <title>Stickman Claymore - Final Version</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; overflow: hidden; margin: 0; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        
        #player { position: absolute; left: 150px; font-size: 18px; line-height: 1.2; white-space: pre; z-index: 10; }
        #ground { position: absolute; bottom: 0; width: 110%; height: 100px; border-top: 2px solid #0f0; background: #111; }
        
        /* BOSS UI */
        #boss-ui { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 400px; display: none; text-align: center; z-index: 100; }
        #boss-bar-bg { width: 100%; height: 20px; background: #300; border: 2px solid #f0f; margin-top: 5px; }
        #boss-bar-fill { width: 100%; height: 100%; background: #f0f; }
        #boss { position: absolute; right: 100px; bottom: 100px; font-size: 24px; line-height: 1.1; white-space: pre; color: #f0f; display: none; }

        /* OVERLAYS */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 1000; 
        }
        #overlay h1 { font-size: 48px; margin-bottom: 20px; }
        .retry-btn { 
            background: transparent; border: 2px solid #0f0; color: #0f0; 
            padding: 15px 30px; font-family: monospace; font-size: 24px; cursor: pointer; 
        }
        .retry-btn:hover { background: #0f0; color: #000; }

        .ui { position: fixed; top: 20px; left: 20px; font-size: 20px; border: 1px solid #0f0; padding: 10px; background: black; z-index: 20; }
        .enemy { position: absolute; bottom: 100px; font-size: 18px; line-height: 1.2; white-space: pre; color: #f00; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui">HP: <span id="hp">100</span> | SCORE: <span id="score-val">0</span> / 1000</div>
    
    <div id="boss-ui">
        <div style="color: #f0f;">NUT BUSTER PRIME</div>
        <div id="boss-bar-bg"><div id="boss-bar-fill"></div></div>
    </div>

    <div id="ground"></div>
    <pre id="player">
   O
  /|\  [=]|[[===============>
 / | \
  / \
 /   \
    </pre>
    <pre id="boss">
     _______
    /       \

   |  (O) (O)|
   |    ___  |
    \  \___/ /
     \______/
    </pre>
</div>

<div id="overlay">
    <h1 id="status-text">GAME OVER</h1>
    <button class="retry-btn" onclick="location.reload()">RETRY</button>
</div>

<script>
    const player = document.getElementById('player');
    const bossEl = document.getElementById('boss');
    const bossUI = document.getElementById('boss-ui');
    const bossFill = document.getElementById('boss-bar-fill');
    const overlay = document.getElementById('overlay');
    const statusText = document.getElementById('status-text');

    let hp = 100, score = 0, scrollPos = 0, facing = 1, active = true;
    let playerY = 100, velocityY = 0, gravity = 0.8, isJumping = false;
    let bossActive = false, bossHP = 1000;
    let enemies = [];
    const keys = {};

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    function endGame(win) {
        active = false;
        overlay.style.display = "flex";
        statusText.innerText = win ? "VICTORY!" : "GAME OVER";
        statusText.style.color = win ? "#0f0" : "#f00";
    }

    function update() {
        if (!active) return;

        // 1. Movement
        if (keys['KeyD']) {
            facing = 1; player.style.transform = "scaleX(1)";
            scrollPos -= 10;
            enemies.forEach(en => en.x -= 10);
            if (!bossActive) score += 2;
        }
        if (keys['KeyA']) {
            facing = -1; player.style.transform = "scaleX(-1)";
            scrollPos += 10;
            enemies.forEach(en => en.x += 10);
        }
        document.getElementById('ground').style.left = (scrollPos % 40) + "px";

        // 2. Physics
        if (keys['KeyW'] && !isJumping) { velocityY = 16; isJumping = true; }
        playerY += velocityY; velocityY -= gravity;
        if (playerY <= 100) { playerY = 100; velocityY = 0; isJumping = false; }
        player.style.bottom = playerY + 'px';

        // 3. Boss Logic
        if (score >= 1000 && !bossActive) {
            bossActive = true;
            bossEl.style.display = "block";
            bossUI.style.display = "block";
            enemies.forEach(en => en.remove());
            enemies = [];
        }

        // 4. Attack
        if (keys['Space']) {
            player.style.color = "#fff";
            if (bossActive) {
                let dist = bossEl.offsetLeft - player.offsetLeft;
                if (dist < 350 && dist > -150) {
                    bossHP -= 15;
                    bossFill.style.width = Math.max(0, (bossHP / 10)) + "%";
                    if (bossHP <= 0) endGame(true);
                }
            } else {
                enemies.forEach((en, i) => {
                    let relX = en.x - player.offsetLeft;
                    if ((facing === 1 && relX > 0 && relX < 300) || (facing === -1 && relX < 0 && relX > -300)) {
                        en.remove(); enemies.splice(i, 1);
                        score += 100;
                    }
                });
            }
            setTimeout(() => player.style.color = "#0f0", 100);
        }

        // 5. Enemy Spawning
        if (!bossActive) {
            if (Math.random() < 0.02 && enemies.length < 5) {
                const e = document.createElement('pre');
                e.className = 'enemy';
                e.innerHTML = `  O\n <|>\n  |\n / \\`;
                e.x = window.innerWidth;
                e.style.left = e.x + 'px';
                document.getElementById('game-container').appendChild(e);
                enemies.push(e);
            }
            enemies.forEach((en, i) => {
                en.x -= 6; en.style.left = en.x + 'px';
                if (en.x < 150 && en.x > 50 && playerY === 100) hp -= 1;
                if (en.x < -100) { en.remove(); enemies.splice(i, 1); }
            });
        }

        document.getElementById('score-val').innerText = score;
        document.getElementById('hp').innerText = Math.max(0, Math.floor(hp));
        if (hp <= 0) endGame(false);

        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
