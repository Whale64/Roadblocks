<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Baseball Chaos</title>
<style>
  body {
    margin: 0;
    background: #87CEEB;
    text-align: center;
    font-family: Arial;
  }
  canvas {
    background: #3fa34d;
    display: block;
    margin: 20px auto;
    border: 4px solid #222;
  }
  button {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>⚾ Baseball Chaos</h1>
<p>WASD = move | SPACE = swing</p>
<button onclick="resetGame()">Reset</button>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player, ball, mode, score, outs, keys, gameOver;

function init() {
  mode = "batting";
  gameOver = false;

  player = {
    x: 150,
    y: 250,
    w: 25,
    h: 25,
    speed: 5,
    swinging: false,
    swingTimer: 0
  };

  ball = {
    x: 750,
    y: 250,
    vx: -6,
    vy: 0,
    r: 8
  };

  score = 0;
  outs = 0;
  keys = {};
}

init();

function drawPlayer() {
  ctx.fillStyle = player.swinging ? "orange" : "blue";
  ctx.fillRect(player.x, player.y, player.w, player.h);
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = "white";
  ctx.fill();
}

function drawUI() {
  ctx.fillStyle = "black";
  ctx.font = "18px Arial";
  ctx.fillText("Score: " + score, 10, 20);
  ctx.fillText("Outs: " + outs, 10, 40);
  ctx.fillText("Mode: " + mode, 10, 60);
}

function drawGameOver() {
  ctx.fillStyle = "red";
  ctx.font = "40px Arial";
  ctx.fillText("GAME OVER", 260, 180);

  ctx.font = "20px Arial";
  ctx.fillText("Click Reset to play again", 280, 220);
}

function resetBall() {
  ball.x = 750;
  ball.y = 200 + Math.random() * 100;
  ball.vx = -6;
  ball.vy = 0;
}

function movePlayer() {
  if (keys["w"]) player.y -= player.speed;
  if (keys["s"]) player.y += player.speed;
  if (keys["a"]) player.x -= player.speed;
  if (keys["d"]) player.x += player.speed;
}

function addOut() {
  outs++;
  if (outs >= 3) {
    gameOver = true;
  }
}

function checkHit() {
  if (
    player.swinging &&
    ball.x < player.x + 40 &&
    ball.x > player.x &&
    Math.abs(ball.y - player.y) < 40
  ) {
    score++;
    mode = "fielding";

    ball.vx = 5 + Math.random() * 3;
    ball.vy = -6 - Math.random() * 3;
  }
}

function updateBatting() {
  ball.x += ball.vx;

  if (ball.x < 0) {
    addOut();
    resetBall();
  }

  if (player.swinging) {
    player.swingTimer--;
    if (player.swingTimer <= 0) {
      player.swinging = false;
    }
  }

  checkHit();
}

function updateFielding() {
  ball.x += ball.vx;
  ball.y += ball.vy;
  ball.vy += 0.3;

  if (
    ball.x > player.x &&
    ball.x < player.x + player.w &&
    ball.y > player.y &&
    ball.y < player.y + player.h
  ) {
    addOut();
    mode = "batting";
    resetBall();
  }

  if (ball.y > canvas.height) {
    mode = "batting";
    resetBall();
  }
}

document.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    e.preventDefault();
    if (!player.swinging && mode === "batting" && !gameOver) {
      player.swinging = true;
      player.swingTimer = 15;
    }
  }
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", (e) => {
  keys[e.key.toLowerCase()] = false;
});

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!gameOver) {
    movePlayer();

    if (mode === "batting") {
      updateBatting();
    } else {
      updateFielding();
    }
  }

  drawPlayer();
  drawBall();
  drawUI();

  if (gameOver) {
    drawGameOver();
  }

  requestAnimationFrame(update);
}

function resetGame() {
  init();
}

update();
</script>

</body>
</html>
