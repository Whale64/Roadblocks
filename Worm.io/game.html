<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Worm.io</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a; /* Tailwind slate-900 */
            touch-action: none; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .pointer-events-auto {
            pointer-events: auto;
        }
        .text-glow {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        /* Terminal text effect */
        .terminal-text {
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body class="text-white">

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer" class="flex flex-col justify-between p-4 md:p-6">
        <div class="flex justify-between items-start">
            <div class="bg-slate-800/80 backdrop-blur-sm rounded-lg p-3 md:p-4 border border-slate-700 shadow-lg pointer-events-auto">
                <h1 class="text-2xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600 tracking-wider">WORM.IO</h1>
                <p class="text-slate-300 font-semibold mt-1 text-sm md:text-base">Length: <span id="scoreDisplay" class="text-white font-bold">20</span></p>
                <p class="text-slate-400 text-xs mt-1">Click/Hold to Boost!</p>
            </div>

            <div class="bg-slate-800/80 backdrop-blur-sm rounded-lg p-3 md:p-4 border border-slate-700 shadow-lg min-w-[150px] pointer-events-auto">
                <h2 class="text-sm md:text-base font-bold text-slate-400 uppercase tracking-widest mb-2 border-b border-slate-700 pb-1">Leaderboard</h2>
                <ul id="leaderboardList" class="text-sm md:text-base space-y-1"></ul>
            </div>
        </div>
    </div>

    <!-- Main Menu / Death Screen -->
    <div id="menuScreen" class="absolute inset-0 bg-slate-950/90 backdrop-blur-md flex items-center justify-center z-50 pointer-events-auto transition-opacity duration-300">
        <div id="menuContent" class="bg-slate-900 p-8 rounded-2xl border border-slate-700 shadow-2xl max-w-md w-full text-center transform transition-all">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600 tracking-tight mb-2">WORM.IO</h1>
            <p id="deathMessage" class="text-slate-400 mb-4 h-6"></p>
            
            <div id="finalScoreContainer" class="hidden mb-6 bg-slate-800 p-4 rounded-xl border border-slate-700">
                <p class="text-sm text-slate-400 uppercase tracking-widest mb-1">Final Length</p>
                <p id="finalScore" class="text-4xl font-bold text-white text-glow">0</p>
            </div>

            <div class="mb-8">
                <p class="text-sm text-slate-400 uppercase tracking-widest mb-3">AI Difficulty</p>
                <div class="flex justify-center space-x-3">
                    <button id="btnEasy" class="flex-1 py-2 rounded-lg transition-all font-bold border">Easy</button>
                    <button id="btnMedium" class="flex-1 py-2 rounded-lg transition-all font-bold border">Medium</button>
                    <button id="btnHard" class="flex-1 py-2 rounded-lg transition-all font-bold border">Hard</button>
                </div>
            </div>

            <button id="startBtn" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-bold py-4 px-8 rounded-xl text-xl transition-all transform hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(16,185,129,0.4)]">
                Play Game
            </button>
        </div>

        <!-- AI Training Loader -->
        <div id="loaderContent" class="hidden flex-col items-center justify-center w-full max-w-2xl px-6">
            <div class="w-20 h-20 border-4 border-green-500/20 border-t-green-500 rounded-full animate-spin mb-8"></div>
            <h2 class="text-2xl font-bold text-green-400 mb-4 tracking-widest">TRAINING NEURAL NETWORK...</h2>
            <div class="w-full bg-slate-800 rounded-full h-2 mb-6 overflow-hidden">
                <div id="progressBar" class="bg-green-500 h-full transition-all duration-300 w-0"></div>
            </div>
            <div id="terminal" class="w-full bg-black/50 border border-slate-700 rounded-lg p-4 h-48 overflow-y-auto terminal-text text-sm text-green-500/80 scrollbar-hide text-left">
                <!-- Log messages go here -->
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // API key provided at runtime
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        const WORLD_SIZE = 4000;
        const INITIAL_LENGTH = 20;
        const BASE_SPEED = 4;
        const BOOST_SPEED = 8;
        const TURN_SPEED = 0.12;
        const FOOD_COUNT = 800;
        const BOT_COUNT = 15;
        const SPACING = 4;
        
        const scoreDisplay = document.getElementById('scoreDisplay');
        const leaderboardList = document.getElementById('leaderboardList');
        const menuScreen = document.getElementById('menuScreen');
        const menuContent = document.getElementById('menuContent');
        const loaderContent = document.getElementById('loaderContent');
        const terminal = document.getElementById('terminal');
        const progressBar = document.getElementById('progressBar');
        const startBtn = document.getElementById('startBtn');
        const deathMessage = document.getElementById('deathMessage');
        const finalScoreContainer = document.getElementById('finalScoreContainer');
        const finalScoreDisplay = document.getElementById('finalScore');
        
        const btnEasy = document.getElementById('btnEasy');
        const btnMedium = document.getElementById('btnMedium');
        const btnHard = document.getElementById('btnHard');

        let gameState = 'MENU';
        let currentDifficulty = 'MEDIUM';
        let worms = [];
        let foods = [];
        let player = null;
        let mouseX = 0, mouseY = 0;
        let isBoosting = false;
        let cameraX = 0, cameraY = 0;
        let frameCount = 0;

        const COLORS = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];
        const BOT_NAMES = ["Slither", "Viper", "Noodle", "DangerNoodle", "Sneaky", "Bot 101", "Gamer", "ProSnake", "Worminator", "Squiggly", "LongBoi", "Spaghetti", "Apex", "Predator", "Glitch"];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function lerpAngle(a, b, t) {
            let delta = b - a;
            while (delta < -Math.PI) delta += Math.PI * 2;
            while (delta > Math.PI) delta -= Math.PI * 2;
            return a + delta * t;
        }

        function randomRange(min, max) { return Math.random() * (max - min) + min; }

        function getVisibleBounds() {
            const padding = 100; 
            return {
                left: cameraX - canvas.width / 2 - padding,
                right: cameraX + canvas.width / 2 + padding,
                top: cameraY - canvas.height / 2 - padding,
                bottom: cameraY + canvas.height / 2 + padding
            };
        }
        
        function setDifficulty(level) {
            currentDifficulty = level;
            [btnEasy, btnMedium, btnHard].forEach(btn => {
                btn.className = "flex-1 py-2 rounded-lg transition-all font-bold border border-slate-700 bg-slate-800/50 text-slate-400";
            });
            
            if(level === 'EASY') {
                btnEasy.className = "flex-1 py-2 rounded-lg transition-all font-bold border border-green-400 bg-green-500 text-white shadow-[0_0_15px_rgba(34,197,94,0.4)] scale-105";
            } else if (level === 'MEDIUM') {
                btnMedium.className = "flex-1 py-2 rounded-lg transition-all font-bold border border-yellow-400 bg-yellow-500 text-white shadow-[0_0_15px_rgba(234,179,8,0.4)] scale-105";
            } else {
                btnHard.className = "flex-1 py-2 rounded-lg transition-all font-bold border border-red-400 bg-red-500 text-white shadow-[0_0_15px_rgba(239,68,68,0.4)] scale-105";
            }
        }

        async function logToTerminal(msg, delay = 100) {
            const p = document.createElement('p');
            p.textContent = `> ${msg}`;
            terminal.appendChild(p);
            terminal.scrollTop = terminal.scrollHeight;
            await new Promise(r => setTimeout(r, delay));
        }

        async function startAiTraining() {
            menuContent.classList.add('hidden');
            loaderContent.classList.remove('hidden');
            terminal.innerHTML = '';
            progressBar.style.width = '0%';

            const steps = [
                { msg: "Initializing synaptic weights...", weight: 10 },
                { msg: `Loading ${currentDifficulty} behavioral dataset...`, weight: 25 },
                { msg: "Mapping collision avoidance vectors...", weight: 45 },
                { msg: "Calibrating predatory instincts...", weight: 65 },
                { msg: "Injecting Gemini 2.5 Flash optimization tokens...", weight: 85 },
                { msg: "AI synchronized. Ready for deployment.", weight: 100 }
            ];

            try {
                // Background Gemini "consultation" for flavor text/strategy
                const strategyPromise = fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Give a 1-sentence technical-sounding strategy for a snake AI on ${currentDifficulty} difficulty. Keep it brief.` }] }]
                    })
                }).then(r => r.json()).catch(() => null);

                for (const step of steps) {
                    await logToTerminal(step.msg, randomRange(400, 800));
                    progressBar.style.width = `${step.weight}%`;
                }

                const result = await strategyPromise;
                const strategyText = result?.candidates?.[0]?.content?.parts?.[0]?.text || "Optimizing movement patterns.";
                await logToTerminal(`STRATEGY OVERRIDE: ${strategyText.trim()}`, 1000);

            } catch (err) {
                await logToTerminal("Warning: Gemini link timeout. Using local heuristics.");
            }

            setTimeout(initGame, 500);
        }

        class Food {
            constructor(x, y, value = 1, color = null) {
                this.x = x !== undefined ? x : randomRange(-WORLD_SIZE/2 + 50, WORLD_SIZE/2 - 50);
                this.y = y !== undefined ? y : randomRange(-WORLD_SIZE/2 + 50, WORLD_SIZE/2 - 50);
                this.value = value;
                this.radius = Math.max(4, Math.min(12, value * 2));
                this.color = color || COLORS[Math.floor(Math.random() * COLORS.length)];
                this.phase = Math.random() * Math.PI * 2;
            }

            draw(ctx, bounds) {
                if (this.x < bounds.left || this.x > bounds.right || this.y < bounds.top || this.y > bounds.bottom) return;
                const wobble = Math.sin(frameCount * 0.1 + this.phase) * 1.5;
                const currentRadius = Math.max(2, this.radius + wobble);
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Worm {
            constructor(isPlayer, name) {
                this.isPlayer = isPlayer;
                this.name = name;
                this.id = Math.random().toString(36).substr(2, 9);
                const spawnLimit = WORLD_SIZE / 2 - 500;
                this.x = randomRange(-spawnLimit, spawnLimit);
                this.y = randomRange(-spawnLimit, spawnLimit);
                this.angle = randomRange(0, Math.PI * 2);
                this.targetAngle = this.angle;
                this.color = isPlayer ? '#10b981' : COLORS[Math.floor(Math.random() * COLORS.length)];
                this.length = INITIAL_LENGTH;
                this.radius = 12;
                this.history = [];
                this.isDead = false;
                this.boosting = false;
                this.aiUpdateTimer = 0;
            }

            update() {
                if (this.isDead) return;
                if (this.isPlayer) {
                    let dx = mouseX - canvas.width / 2;
                    let dy = mouseY - canvas.height / 2;
                    if (Math.hypot(dx, dy) > 20) this.targetAngle = Math.atan2(dy, dx);
                    this.boosting = isBoosting && this.length > INITIAL_LENGTH + 5;
                } else {
                    this.updateBotAI();
                }

                this.angle = lerpAngle(this.angle, this.targetAngle, TURN_SPEED);
                let currentSpeed = this.boosting ? BOOST_SPEED : BASE_SPEED;
                
                if (this.boosting && frameCount % 5 === 0) {
                    this.length = Math.max(INITIAL_LENGTH, this.length - 1);
                    if (this.history.length > SPACING * 2) {
                        const tailPos = this.history[this.history.length - 1];
                        foods.push(new Food(tailPos.x, tailPos.y, 1, this.color));
                    }
                } else if (!this.boosting && this.length < INITIAL_LENGTH) {
                    this.length += 0.05;
                }
                
                this.radius = 12 + Math.log(Math.max(1, this.length - INITIAL_LENGTH + 1)) * 3;
                this.x += Math.cos(this.angle) * currentSpeed;
                this.y += Math.sin(this.angle) * currentSpeed;
                this.history.unshift({x: this.x, y: this.y});
                const maxHistory = this.length * SPACING;
                if (this.history.length > maxHistory) this.history.pop();

                const halfWorld = WORLD_SIZE / 2;
                if (this.x < -halfWorld || this.x > halfWorld || this.y < -halfWorld || this.y > halfWorld) this.die();
            }

            updateBotAI() {
                this.aiUpdateTimer--;
                let conf = { updateMin: 10, updateMax: 25, foodSample: 30, evade: true, aggressive: false };
                if (currentDifficulty === 'EASY') conf = { updateMin: 20, updateMax: 40, foodSample: 10, evade: false, aggressive: false };
                else if (currentDifficulty === 'HARD') conf = { updateMin: 5, updateMax: 15, foodSample: 60, evade: true, aggressive: true };
                
                if (Math.random() < (currentDifficulty === 'HARD' ? 0.01 : 0.002) && this.length > INITIAL_LENGTH + 10) this.boosting = true;
                if (this.boosting && (Math.random() < 0.05 || this.length <= INITIAL_LENGTH)) this.boosting = false;

                if (this.aiUpdateTimer <= 0) {
                    this.aiUpdateTimer = Math.floor(randomRange(conf.updateMin, conf.updateMax));
                    const halfWorld = WORLD_SIZE / 2, dangerZone = 300;
                    if (this.x < -halfWorld + dangerZone) this.targetAngle = 0;
                    else if (this.x > halfWorld - dangerZone) this.targetAngle = Math.PI;
                    else if (this.y < -halfWorld + dangerZone) this.targetAngle = Math.PI / 2;
                    else if (this.y > halfWorld - dangerZone) this.targetAngle = -Math.PI / 2;
                    else {
                        let acted = false;
                        if (conf.evade || conf.aggressive) {
                            let closestWormDist = Infinity, closestWorm = null;
                            for (let w of worms) {
                                if (w === this || w.isDead) continue;
                                let dx = w.x - this.x, dy = w.y - this.y, dist = dx*dx + dy*dy;
                                if (dist < closestWormDist && dist < 150000) { closestWormDist = dist; closestWorm = w; }
                            }
                            if (closestWorm) {
                                if (conf.evade && closestWormDist < 40000) {
                                    this.targetAngle = Math.atan2(this.y - closestWorm.y, this.x - closestWorm.x) + randomRange(-0.5, 0.5);
                                    if (conf.aggressive) this.boosting = true;
                                    acted = true;
                                } else if (conf.aggressive && closestWormDist < 120000) {
                                    let interceptX = closestWorm.x + Math.cos(closestWorm.angle) * 150;
                                    let interceptY = closestWorm.y + Math.sin(closestWorm.angle) * 150;
                                    this.targetAngle = Math.atan2(interceptY - this.y, interceptX - this.x);
                                    if (Math.random() < 0.3) this.boosting = true;
                                    acted = true;
                                }
                            }
                        }
                        if (!acted) {
                            let bestFood = null, bestDist = Infinity;
                            const sampleSize = Math.min(conf.foodSample, foods.length);
                            for (let i = 0; i < sampleSize; i++) {
                                const f = foods[Math.floor(Math.random() * foods.length)];
                                let dx = f.x - this.x, dy = f.y - this.y, dist = dx*dx + dy*dy;
                                if (dist < bestDist && dist < 1000000) { bestDist = dist; bestFood = f; }
                            }
                            if (bestFood) this.targetAngle = Math.atan2(bestFood.y - this.y, bestFood.x - this.x);
                            else this.targetAngle += randomRange(-1, 1);
                        }
                    }
                }
            }

            draw(ctx, bounds) {
                if (this.isDead || this.history.length === 0) return;
                let isVisible = false;
                for (let i = this.history.length - 1; i >= 0; i -= SPACING) {
                    let pt = this.history[i];
                    if (!pt) continue;
                    if (pt.x > bounds.left && pt.x < bounds.right && pt.y > bounds.top && pt.y < bounds.bottom) {
                        isVisible = true;
                        let sizeRatio = 1 - (i / this.history.length) * 0.4; 
                        let segRadius = this.radius * sizeRatio;
                        ctx.beginPath();
                        ctx.arc(pt.x, pt.y, segRadius, 0, Math.PI * 2);
                        ctx.fillStyle = i % (SPACING * 2) === 0 ? this.color : shadeColor(this.color, -10);
                        ctx.fill();
                        ctx.lineWidth = 2;
                        ctx.strokeStyle = '#00000080';
                        ctx.stroke();
                    }
                }
                if (isVisible) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 1, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#000';
                    ctx.stroke();
                    const eyeOffset = this.radius * 0.5, eyeRadius = this.radius * 0.3, pupilRadius = eyeRadius * 0.5;
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    ctx.beginPath(); ctx.arc(eyeOffset, -eyeOffset, eyeRadius, 0, Math.PI * 2); ctx.fillStyle = 'white'; ctx.fill();
                    ctx.beginPath(); ctx.arc(eyeOffset + pupilRadius/2, -eyeOffset, pupilRadius, 0, Math.PI * 2); ctx.fillStyle = 'black'; ctx.fill();
                    ctx.beginPath(); ctx.arc(eyeOffset, eyeOffset, eyeRadius, 0, Math.PI * 2); ctx.fillStyle = 'white'; ctx.fill();
                    ctx.beginPath(); ctx.arc(eyeOffset + pupilRadius/2, eyeOffset, pupilRadius, 0, Math.PI * 2); ctx.fillStyle = 'black'; ctx.fill();
                    ctx.restore();
                    ctx.font = '14px Arial'; ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.strokeStyle = 'black'; ctx.lineWidth = 3;
                    ctx.strokeText(this.name, this.x, this.y - this.radius - 10);
                    ctx.fillText(this.name, this.x, this.y - this.radius - 10);
                }
            }

            die() {
                if (this.isDead) return;
                this.isDead = true;
                const dropRate = 2;
                for (let i = 0; i < this.history.length; i += SPACING * dropRate) {
                    let pt = this.history[i];
                    if (pt) foods.push(new Food(pt.x + randomRange(-10, 10), pt.y + randomRange(-10, 10), Math.max(2, Math.floor(this.radius / 3)), this.color));
                }
                if (this.isPlayer) endGame();
                else setTimeout(() => { if (gameState === 'PLAYING') worms.push(new Worm(false, BOT_NAMES[Math.floor(Math.random() * BOT_NAMES.length)])); }, 3000);
            }
        }

        function shadeColor(color, percent) {
            let R = parseInt(color.substring(1,3),16), G = parseInt(color.substring(3,5),16), B = parseInt(color.substring(5,7),16);
            R = parseInt(R * (100 + percent) / 100); G = parseInt(G * (100 + percent) / 100); B = parseInt(B * (100 + percent) / 100);
            R = Math.min(255, R); G = Math.min(255, G); B = Math.min(255, B);
            return "#" + (R.toString(16).padStart(2,'0')) + (G.toString(16).padStart(2,'0')) + (B.toString(16).padStart(2,'0'));
        }

        function initGame() {
            worms = []; foods = [];
            player = new Worm(true, "You");
            worms.push(player);
            for (let i = 0; i < BOT_COUNT; i++) worms.push(new Worm(false, BOT_NAMES[Math.floor(Math.random() * BOT_NAMES.length)]));
            for (let i = 0; i < FOOD_COUNT; i++) foods.push(new Food());
            gameState = 'PLAYING';
            menuScreen.classList.add('hidden');
            menuScreen.classList.remove('flex');
            loaderContent.classList.add('hidden');
            menuContent.classList.remove('hidden');
            cameraX = player.x; cameraY = player.y;
            updateLeaderboard();
        }

        function endGame() {
            gameState = 'DEAD';
            finalScoreDisplay.innerText = Math.floor(player.length);
            finalScoreContainer.classList.remove('hidden');
            deathMessage.innerText = ["Ouch!", "Got 'em!", "Slithered too close!", "Watch out for tails!", "Better luck next time!"][Math.floor(Math.random() * 5)];
            startBtn.innerText = "Play Again";
            menuScreen.classList.remove('hidden');
            menuScreen.classList.add('flex');
        }

        function handleCollisions() {
            if (gameState !== 'PLAYING') return;
            for (let w of worms) {
                if (w.isDead) continue;
                for (let j = foods.length - 1; j >= 0; j--) {
                    let f = foods[j];
                    let dx = w.x - f.x, dy = w.y - f.y;
                    if (dx*dx + dy*dy < (w.radius + f.radius) * (w.radius + f.radius)) {
                        w.length += f.value * 0.5;
                        foods.splice(j, 1);
                        if (foods.length < FOOD_COUNT) foods.push(new Food());
                    }
                }
                for (let other of worms) {
                    if (w === other || other.isDead) continue;
                    for (let k = SPACING * 2; k < other.history.length; k += SPACING) {
                        let seg = other.history[k];
                        if (!seg) continue;
                        let dx = w.x - seg.x, dy = w.y - seg.y, threshold = (w.radius + other.radius) * 0.8;
                        if (dx*dx + dy*dy < threshold * threshold) { w.die(); break; }
                    }
                }
            }
        }

        function updateLeaderboard() {
            if (frameCount % 30 !== 0) return;
            let sortedWorms = [...worms].filter(w => !w.isDead).sort((a, b) => b.length - a.length);
            leaderboardList.innerHTML = '';
            for (let i = 0; i < Math.min(5, sortedWorms.length); i++) {
                let w = sortedWorms[i];
                let li = document.createElement('li');
                li.className = `flex justify-between ${w.isPlayer ? 'text-green-400 font-bold' : 'text-slate-300'}`;
                li.innerHTML = `<span>${i+1}. ${w.name}</span> <span>${Math.floor(w.length)}</span>`;
                leaderboardList.appendChild(li);
            }
        }

        function gameLoop() {
            frameCount++;
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (gameState === 'PLAYING') {
                if (frameCount % 100 === 0) worms = worms.filter(w => !w.isDead);
                for (let w of worms) w.update();
                handleCollisions();
                if (player && !player.isDead) scoreDisplay.innerText = Math.floor(player.length);
                updateLeaderboard();
                if (player && !player.isDead) { cameraX += (player.x - cameraX) * 0.1; cameraY += (player.y - cameraY) * 0.1; }
            }
            ctx.save();
            ctx.translate(canvas.width / 2 - cameraX, canvas.height / 2 - cameraY);
            const bounds = getVisibleBounds();
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 2; ctx.beginPath();
            const gridSize = 100;
            for (let x = Math.floor(bounds.left/gridSize)*gridSize; x <= bounds.right; x += gridSize) { ctx.moveTo(x, bounds.top); ctx.lineTo(x, bounds.bottom); }
            for (let y = Math.floor(bounds.top/gridSize)*gridSize; y <= bounds.bottom; y += gridSize) { ctx.moveTo(bounds.left, y); ctx.lineTo(bounds.right, y); }
            ctx.stroke();
            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 10; ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 20;
            ctx.strokeRect(-WORLD_SIZE/2, -WORLD_SIZE/2, WORLD_SIZE, WORLD_SIZE);
            ctx.shadowBlur = 0;
            for (let f of foods) f.draw(ctx, bounds);
            let wormsToDraw = [...worms].sort((a, b) => a.length - b.length);
            for (let w of wormsToDraw) w.draw(ctx, bounds);
            ctx.restore();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('touchmove', (e) => { if(e.touches.length > 0) { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; } });
        window.addEventListener('mousedown', () => isBoosting = true);
        window.addEventListener('mouseup', () => isBoosting = false);
        window.addEventListener('touchstart', (e) => { isBoosting = true; if(e.touches.length > 0) { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; } });
        window.addEventListener('touchend', () => isBoosting = false);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') isBoosting = true; });
        window.addEventListener('keyup', (e) => { if (e.code === 'Space') isBoosting = false; });
        
        btnEasy.addEventListener('click', () => setDifficulty('EASY'));
        btnMedium.addEventListener('click', () => setDifficulty('MEDIUM'));
        btnHard.addEventListener('click', () => setDifficulty('HARD'));
        setDifficulty('MEDIUM');
        startBtn.addEventListener('click', startAiTraining);

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
