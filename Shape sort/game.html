<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screw Sort - OG Restored</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

:root {
  --bg: #161a1d;
  --panel: #23292f;
  --accent: #fbc531;
  --text: #ffffff;
  --bolt: linear-gradient(90deg, #2c3e50 0%, #bdc3c7 50%, #2c3e50 100%);
  --gold-grad: linear-gradient(145deg, #f1c40f, #d4af37);
  --silver-grad: linear-gradient(145deg, #bdc3c7, #95a5a6);
  --bronze-grad: linear-gradient(145deg, #cd7f32, #a0522d);
}

body.light-mode { --bg: #f5f6fa; --panel: #dcdde1; --text: #2f3640; }
body {
  background: var(--bg); font-family: 'Fredoka One', cursive;
  margin: 0; display: flex; flex-direction: column; align-items: center;
  height: 100vh; color: var(--text); overflow: hidden; transition: 0.3s;
  user-select: none;
}

header { 
  margin-top: 15px; display: flex; justify-content: space-around; 
  align-items: center; width: 100%; max-width: 500px; z-index: 1000;
}

.lvl-pill { background: var(--panel); padding: 8px 22px; border-radius: 25px; cursor: pointer; border: 2px solid var(--accent); }

#board {
  display: flex; justify-content: center; align-items: flex-end;
  flex-wrap: wrap; gap: 20px; margin-top: 100px; width: 95%; perspective: 1200px;
}

.bolt-unit { display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; }
.bolt-shaft { width: 22px; height: 135px; background: var(--bolt); border-radius: 6px 6px 0 0; position: relative; }

.stack {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column-reverse; align-items: center;
}

.nut-container {
  width: 74px; height: 34px; position: relative; margin-bottom: -15px;
  transform-style: preserve-3d; transition: transform 0.2s ease-out;
}

.nut-3d {
  position: absolute; inset: 0; background: var(--c-main); border-radius: 8px;
  transform: rotateX(45deg);
  box-shadow: 0 1px 0 var(--c-dark), 0 2px 0 var(--c-dark), 0 3px 0 var(--c-dark), 
              0 4px 0 var(--c-dark), 0 8px 12px rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
}

.shape { font-size: 18px; color: white; opacity: 0.9; pointer-events: none; }
body.hide-shapes .shape { display: none; }

.lifted { transform: translateY(-160px) !important; }
.ghost-nut { position: fixed; pointer-events: none; z-index: 5000; transition: all 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95); }

.base { width: 80px; height: 14px; background: #2f3640; border-radius: 4px; border-bottom: 4px solid #000; margin-top: 5px; }
.active .base { background: var(--accent); box-shadow: 0 0 15px var(--accent); }

/* OG SETTINGS STYLING */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); }
.overlay.show { display: flex; }
.modal { background: var(--panel); padding: 25px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; border: 3px solid var(--accent); color: white; }

.settings-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }

.diff-switch { display: flex; background: #161a1d; border-radius: 12px; padding: 5px; margin-top: 8px; width: 100%; box-sizing: border-box; }
.diff-opt { flex: 1; padding: 10px; cursor: pointer; border-radius: 10px; font-size: 11px; transition: 0.2s; }
.diff-opt.active { background: var(--accent); color: #000; }

.switch { position: relative; width: 44px; height: 24px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; inset: 0; background: #4b4b4b; transition: .4s; border-radius: 34px; }
.slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
input:checked + .slider { background: var(--accent); }
input:checked + .slider:before { transform: translateX(20px); }

/* LEVEL GRID TROPHIES */
.lvl-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; max-height: 350px; overflow-y: auto; padding: 10px; }
.lvl-btn { background: rgba(255,255,255,0.05); padding: 12px 0; border-radius: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
.lvl-btn.rank-3 { background: var(--gold-grad); color: #000; box-shadow: 0 4px 10px rgba(241, 196, 15, 0.3); }
.lvl-btn.rank-2 { background: var(--silver-grad); color: #000; }
.lvl-btn.rank-1 { background: var(--bronze-grad); color: #fff; }

.btn-ui { background: var(--accent); border: none; color: #000; padding: 12px 24px; border-radius: 12px; cursor: pointer; font-family: 'Fredoka One'; margin: 5px; box-shadow: 0 4px 0 #c29921; }

#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 3000; }
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<header>
  <div style="font-size:28px; cursor:pointer" onclick="openMenu('setMenu')">⚙️</div>
  <div class="lvl-pill" onclick="openMenu('lvlMenu')">LVL <span id="curLvlDisplay">1</span></div>
  <div>MOVES: <span id="mCount">0</span></div>
</header>

<div id="board"></div>

<div style="margin-top: 30px;">
  <button class="btn-ui" onclick="undo()">UNDO</button>
  <button class="btn-ui" style="background:#7f8c8d; box-shadow:0 4px 0 #5d6869" onclick="reset()">RESTART</button>
</div>

<div id="setMenu" class="overlay" onclick="closeMenus()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 style="margin-top:0">SETTINGS</h2>
    <div style="text-align: left; margin-bottom: 15px;">
        <span style="font-size: 11px; opacity: 0.7;">DIFFICULTY</span>
        <div class="diff-switch">
            <div class="diff-opt" id="d-easy" onclick="setDiff('easy')">EASY</div>
            <div class="diff-opt" id="d-medium" onclick="setDiff('medium')">MEDIUM</div>
            <div class="diff-opt" id="d-hard" onclick="setDiff('hard')">HARD</div>
        </div>
    </div>
    <div class="settings-row">
        <span>3D SHAPES</span>
        <label class="switch"><input type="checkbox" id="shapeToggle" checked onchange="document.body.classList.toggle('hide-shapes', !this.checked)"><span class="slider"></span></label>
    </div>
    <div class="settings-row">
        <span>LIGHT MODE</span>
        <label class="switch"><input type="checkbox" onchange="document.body.classList.toggle('light-mode')"><span class="slider"></span></label>
    </div>
    <div class="settings-row">
        <span>SOUNDS</span>
        <label class="switch"><input type="checkbox" id="sndToggle" checked><span class="slider"></span></label>
    </div>
    <br><button class="btn-ui" onclick="closeMenus()">CLOSE</button>
  </div>
</div>

<div id="lvlMenu" class="overlay" onclick="closeMenus()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>SELECT LEVEL</h2>
    <div class="lvl-grid" id="lvlGrid"></div>
  </div>
</div>

<script>
const COLORS = [
  { m: '#ff4757', d: '#962a33', s: '▲' }, { m: '#2ed573', d: '#1e8e4c', s: '■' },
  { m: '#1e90ff', d: '#1565b3', s: '★' }, { m: '#ffa502', d: '#b37401', s: '●' },
  { m: '#9c88ff', d: '#6d5fb3', s: '◆' }, { m: '#eccc68', d: '#b3923d', s: '✖' }
];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(type) {
  if(!document.getElementById('sndToggle').checked) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(type === 'click' ? 600 : (type === 'fail' ? 100 : 250), audioCtx.currentTime);
  gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
  osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

let state = { diff: 'easy', lvl: 1, scores: {} };
let cols = [], sel = null, moves = 0, history = [], isAnimating = false;

function init(diff, lvlNum) {
  state.diff = diff || state.diff;
  state.lvl = lvlNum || state.lvl;
  
  document.querySelectorAll('.diff-opt').forEach(el => el.classList.remove('active'));
  document.getElementById('d-' + state.diff).classList.add('active');
  document.getElementById('curLvlDisplay').textContent = state.lvl;

  const colorCount = (state.diff === 'easy' ? 3 : (state.diff === 'medium' ? 5 : 6)) + Math.floor((state.lvl-1)/5);
  const pool = [];
  for(let i=0; i < colorCount; i++) for(let j=0; j<4; j++) pool.push(i % COLORS.length);
  pool.sort(() => Math.random() - 0.5);
  
  cols = Array.from({length: colorCount + 2}, () => []);
  for(let i=0; i < colorCount; i++) cols[i] = pool.slice(i*4, (i+1)*4);
  
  sel = null; moves = 0; isAnimating = false;
  document.getElementById('mCount').textContent = 0;
  render();
}

function render() {
  const b = document.getElementById('board'); b.innerHTML = '';
  cols.forEach((col, i) => {
    const unit = document.createElement('div');
    unit.className = `bolt-unit ${sel === i ? 'active' : ''}`;
    unit.innerHTML = `<div class="bolt-shaft"><div class="stack"></div></div><div class="base"></div>`;
    const stack = unit.querySelector('.stack');
    col.forEach((cIdx, r) => {
      const cont = document.createElement('div');
      cont.className = 'nut-container' + (sel === i && r === col.length - 1 ? ' lifted' : '');
      cont.style.setProperty('--c-main', COLORS[cIdx].m);
      cont.style.setProperty('--c-dark', COLORS[cIdx].d);
      cont.innerHTML = `<div class="nut-3d"><span class="shape">${COLORS[cIdx].s}</span></div>`;
      stack.appendChild(cont);
    });
    unit.onclick = () => !isAnimating && handleClick(i);
    b.appendChild(unit);
  });
}

function handleClick(idx) {
  if (sel === null) {
    if (cols[idx].length) { sel = idx; playSfx('click'); render(); }
  } else if (sel === idx) {
    sel = null; render();
  } else {
    const from = cols[sel], to = cols[idx];
    if (to.length < 4 && (to.length === 0 || to[to.length - 1] === from[from.length - 1])) {
        history.push(cols.map(c => [...c]));
        processMultiMove(sel, idx, from[from.length-1]);
    } else { playSfx('fail'); sel = null; render(); }
  }
}

async function processMultiMove(f, t, colorIdx) {
    isAnimating = true;
    let count = 0;
    for(let i = cols[f].length-1; i >= 0; i--) {
        if(cols[f][i] === colorIdx && cols[t].length + count < 4) count++;
        else break;
    }
    const startSel = f;
    sel = null; 

    for(let i = 0; i < count; i++) {
        await animateSingle(startSel, t, colorIdx);
        cols[t].push(cols[f].pop());
        playSfx('land');
        render();
    }
    moves++;
    document.getElementById('mCount').textContent = moves;
    isAnimating = false;
    checkWin();
}

function animateSingle(f, t, colorIdx) {
    return new Promise(resolve => {
        const units = document.querySelectorAll('.bolt-unit');
        const fromStack = units[f].querySelector('.stack');
        if(fromStack.lastElementChild) fromStack.lastElementChild.style.opacity = '0';
        const ghost = document.createElement('div');
        ghost.className = 'nut-container ghost-nut';
        ghost.style.setProperty('--c-main', COLORS[colorIdx].m);
        ghost.style.setProperty('--c-dark', COLORS[colorIdx].d);
        ghost.innerHTML = `<div class="nut-3d"><span class="shape">${COLORS[colorIdx].s}</span></div>`;
        const start = units[f].getBoundingClientRect();
        const end = units[t].getBoundingClientRect();
        ghost.style.left = (start.left + start.width/2 - 37) + 'px';
        ghost.style.top = (start.top + 10) + 'px';
        document.body.appendChild(ghost);
        ghost.offsetHeight;
        ghost.style.transform = `translateY(-160px)`;
        setTimeout(() => {
            ghost.style.transform = `translateY(-160px) translateX(${end.left - start.left}px) rotateZ(15deg)`;
            setTimeout(() => {
                ghost.style.transform = `translateY(0px) translateX(${end.left - start.left}px)`;
                setTimeout(() => { ghost.remove(); resolve(); }, 150);
            }, 300);
        }, 150);
    });
}

function checkWin() {
  if (cols.every(c => c.length === 0 || (c.length === 4 && c.every(v => v === c[0])))) {
    const perfect = cols.filter(c => c.length).length * 2.5;
    const rank = moves <= perfect ? 3 : (moves <= perfect * 1.6 ? 2 : 1);
    state.scores[state.lvl] = Math.max(state.scores[state.lvl] || 0, rank);
    startConfetti();
    setTimeout(() => init(state.diff, state.lvl + 1), 2000);
  }
}

function startConfetti() {
  const c = document.getElementById('confetti'); const ctx = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  let p = Array.from({length:100}, () => ({ x:Math.random()*c.width, y:-10, v:Math.random()*4+2, color:`hsl(${Math.random()*360},80%,60%)` }));
  function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    p.forEach(i => { i.y += i.v; ctx.fillStyle = i.color; ctx.fillRect(i.x, i.y, 6, 6); });
    if(p.some(i => i.y < c.height)) requestAnimationFrame(draw);
  }
  draw();
}

function setDiff(d) { state.diff = d; init(d, 1); }
function openMenu(id) { document.getElementById(id).classList.add('show'); if(id === 'lvlMenu') switchTab(); }
function closeMenus() { document.querySelectorAll('.overlay').forEach(o => o.classList.remove('show')); }
function reset() { init(state.diff, state.lvl); }
function undo() { if(history.length) { cols = history.pop(); render(); } }

function switchTab() {
  const grid = document.getElementById('lvlGrid'); grid.innerHTML = '';
  for(let i=1; i<=20; i++) {
    const r = state.scores[i] || 0;
    const b = document.createElement('div');
    b.className = `lvl-btn rank-${r}`;
    b.innerHTML = `<span>${i}</span><div style="font-size:9px">${'★'.repeat(r)}</div>`;
    b.onclick = () => { init(state.diff, i); closeMenus(); };
    grid.appendChild(b);
  }
}

init('easy', 1);
</script>
</body>
</html>
