<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3E Minesweeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap');

        :root {
            --m3e-bg: #fafafa;
            --m3e-accent: #000000;
            --m3e-surface: #ffffff;
            --m3e-border: #e2e8f0;
            --cell-unrevealed: #ffffff;
            --cell-revealed: #f1f5f9;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--m3e-bg);
            color: var(--m3e-accent);
            user-select: none;
            -webkit-user-select: none;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* M3E Grid Styling */
        .grid-container {
            display: grid;
            gap: 4px;
            padding: 8px;
            background: var(--m3e-surface);
            border: 2px solid var(--m3e-accent);
            border-radius: 12px;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.1);
            margin: 0 auto;
            width: fit-content;
        }

        .cell {
            width: 32px;
            height: 32px;
            background-color: var(--cell-unrevealed);
            border: 1px solid var(--m3e-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .cell:hover:not(.revealed) {
            transform: translateY(-2px);
            border-color: var(--m3e-accent);
            box-shadow: 0 4px 0px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .cell.revealed {
            background-color: var(--cell-revealed);
            border-color: transparent;
            cursor: default;
            transform: none !important;
            box-shadow: none !important;
        }

        .cell.flagged::after {
            content: '🚩';
            font-size: 12px;
        }

        .cell.mine.revealed {
            background-color: #000;
            color: #fff;
        }

        .cell.mine.revealed::after {
            content: '×';
            font-size: 20px;
        }

        /* Number Colors - M3E Palette */
        .n-1 { color: #3b82f6; }
        .n-2 { color: #10b981; }
        .n-3 { color: #ef4444; }
        .n-4 { color: #6366f1; }
        .n-5 { color: #f59e0b; }
        .n-6 { color: #06b6d4; }
        .n-7 { color: #000000; }
        .n-8 { color: #64748b; }

        .m3e-card {
            background: white;
            border: 2px solid var(--m3e-accent);
            border-radius: 16px;
            box-shadow: 8px 8px 0px rgba(0,0,0,1);
        }

        .m3e-btn-active {
            background: var(--m3e-accent) !important;
            color: white !important;
        }

        @media (max-width: 500px) {
            .cell { width: 28px; height: 28px; font-size: 12px; gap: 2px; }
            .grid-container { gap: 2px; padding: 4px; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-2xl flex flex-col gap-8">
        <header class="flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight">Mines.</h1>
                <p class="text-slate-400 font-medium">Clear the field, find the truth.</p>
            </div>
            <div class="flex gap-2">
                <button onclick="setDifficulty('easy')" class="diff-btn px-4 py-1.5 text-xs font-bold uppercase rounded-full border-2 border-black bg-white hover:bg-black hover:text-white transition-all" id="btn-easy">Easy</button>
                <button onclick="setDifficulty('medium')" class="diff-btn px-4 py-1.5 text-xs font-bold uppercase rounded-full border-2 border-black bg-white hover:bg-black hover:text-white transition-all" id="btn-medium">Med</button>
                <button onclick="setDifficulty('hard')" class="diff-btn px-4 py-1.5 text-xs font-bold uppercase rounded-full border-2 border-black bg-white hover:bg-black hover:text-white transition-all" id="btn-hard">Hard</button>
            </div>
        </header>

        <main class="m3e-card p-6 flex flex-col gap-6">
            <div class="flex justify-between items-center px-2">
                <div class="flex flex-col">
                    <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Detected</span>
                    <span id="mine-count" class="text-3xl font-bold mono tracking-tighter">000</span>
                </div>
                
                <button id="reset-btn" class="w-14 h-14 rounded-full border-4 border-black bg-yellow-300 flex items-center justify-center text-2xl hover:scale-110 active:scale-90 transition-transform shadow-[4px_4px_0px_rgba(0,0,0,1)]">
                    ●
                </button>

                <div class="flex flex-col items-end">
                    <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Elapsed</span>
                    <span id="timer" class="text-3xl font-bold mono tracking-tighter">000</span>
                </div>
            </div>

            <div id="game-board" class="grid-container"></div>
        </main>

        <footer class="text-center">
            <div class="inline-flex gap-4 px-6 py-2 bg-slate-100 rounded-full text-[10px] font-black uppercase tracking-widest text-slate-500">
                <span>Left: Reveal</span>
                <span class="opacity-30">|</span>
                <span>Right: Flag</span>
                <span class="opacity-30">|</span>
                <span>Space: Chord</span>
            </div>
        </footer>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center hidden z-50">
        <div class="bg-white border-4 border-black p-10 rounded-2xl shadow-[12px_12px_0px_rgba(255,255,255,0.2)] text-center max-w-sm w-full mx-4">
            <div id="modal-icon" class="text-6xl mb-4">×</div>
            <h2 id="modal-title" class="text-4xl font-black mb-2 italic">LOSED</h2>
            <p id="modal-msg" class="text-slate-500 font-semibold mb-8">Better luck next run.</p>
            <button onclick="closeModal()" class="w-full bg-black text-white font-black py-4 rounded-xl hover:bg-slate-800 transition-colors uppercase tracking-widest">
                Restart
            </button>
        </div>
    </div>

    <script>
        const CONFIGS = {
            easy: { rows: 9, cols: 9, mines: 10 },
            medium: { rows: 16, cols: 16, mines: 40 },
            hard: { rows: 16, cols: 30, mines: 99 }
        };

        let currentDifficulty = 'easy';
        let board = [];
        let minesLocations = new Set();
        let revealedCount = 0;
        let flaggedCount = 0;
        let isGameOver = false;
        let timerInterval = null;
        let seconds = 0;
        let firstClick = true;

        const boardElement = document.getElementById('game-board');
        const mineCountDisplay = document.getElementById('mine-count');
        const timerDisplay = document.getElementById('timer');
        const resetBtn = document.getElementById('reset-btn');
        const modal = document.getElementById('modal');

        function initGame() {
            const config = CONFIGS[currentDifficulty];
            board = [];
            minesLocations.clear();
            revealedCount = 0;
            flaggedCount = 0;
            isGameOver = false;
            firstClick = true;
            clearInterval(timerInterval);
            seconds = 0;
            
            updateDisplay();
            renderBoard();
            updateDifficultyUI();
        }

        function setDifficulty(diff) {
            currentDifficulty = diff;
            initGame();
        }

        function updateDifficultyUI() {
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('m3e-btn-active'));
            document.getElementById(`btn-${currentDifficulty}`).classList.add('m3e-btn-active');
        }

        function updateDisplay() {
            const config = CONFIGS[currentDifficulty];
            mineCountDisplay.innerText = String(Math.max(0, config.mines - flaggedCount)).padStart(3, '0');
            timerDisplay.innerText = String(seconds).padStart(3, '0');
            resetBtn.innerText = '●';
        }

        function renderBoard() {
            const config = CONFIGS[currentDifficulty];
            boardElement.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
            boardElement.innerHTML = '';

            for (let r = 0; r < config.rows; r++) {
                board[r] = [];
                for (let c = 0; c < config.cols; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    
                    cell.addEventListener('mousedown', (e) => {
                        if (e.button === 0) handleCellClick(r, c);
                        if (e.button === 2) handleRightClick(r, c);
                    });
                    
                    cell.addEventListener('contextmenu', e => e.preventDefault());

                    // Touch support
                    let touchTimer;
                    cell.addEventListener('touchstart', (e) => {
                        touchTimer = setTimeout(() => handleRightClick(r, c), 400);
                    }, {passive: true});
                    cell.addEventListener('touchend', () => clearTimeout(touchTimer));

                    boardElement.appendChild(cell);
                    board[r][c] = {
                        element: cell,
                        isMine: false,
                        isRevealed: false,
                        isFlagged: false,
                        neighborMines: 0,
                        r, c
                    };
                }
            }
        }

        function placeMines(firstR, firstC) {
            const config = CONFIGS[currentDifficulty];
            let placed = 0;
            while (placed < config.mines) {
                let r = Math.floor(Math.random() * config.rows);
                let c = Math.floor(Math.random() * config.cols);
                const isNearFirstClick = Math.abs(r - firstR) <= 1 && Math.abs(c - firstC) <= 1;
                
                if (!board[r][c].isMine && !isNearFirstClick) {
                    board[r][c].isMine = true;
                    minesLocations.add(`${r},${c}`);
                    placed++;
                }
            }
            for (let r = 0; r < config.rows; r++) {
                for (let c = 0; c < config.cols; c++) {
                    if (!board[r][c].isMine) board[r][c].neighborMines = countNeighborMines(r, c);
                }
            }
        }

        function countNeighborMines(r, c) {
            const config = CONFIGS[currentDifficulty];
            let count = 0;
            getNeighbors(r, c).forEach(n => {
                if (board[n.r][n.c].isMine) count++;
            });
            return count;
        }

        function getNeighbors(r, c) {
            const config = CONFIGS[currentDifficulty];
            const neighbors = [];
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    if (i === 0 && j === 0) continue;
                    let nr = r + i, nc = c + j;
                    if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols) {
                        neighbors.push({r: nr, c: nc});
                    }
                }
            }
            return neighbors;
        }

        function handleCellClick(r, c) {
            if (isGameOver || board[r][c].isFlagged) return;

            if (firstClick) {
                firstClick = false;
                placeMines(r, c);
                startTimer();
            }

            if (board[r][c].isRevealed) {
                chord(r, c);
                return;
            }

            if (board[r][c].isMine) {
                gameOver(false);
                return;
            }

            revealCell(r, c);
            checkWin();
        }

        function handleRightClick(r, c) {
            if (isGameOver || board[r][c].isRevealed) return;
            const cell = board[r][c];
            cell.isFlagged = !cell.isFlagged;
            cell.element.classList.toggle('flagged');
            flaggedCount += cell.isFlagged ? 1 : -1;
            updateDisplay();
        }

        function revealCell(r, c) {
            const cell = board[r][c];
            if (cell.isRevealed || cell.isFlagged) return;

            cell.isRevealed = true;
            revealedCount++;
            cell.element.classList.add('revealed');

            if (cell.neighborMines > 0) {
                cell.element.innerText = cell.neighborMines;
                cell.element.classList.add(`n-${cell.neighborMines}`);
            } else {
                getNeighbors(r, c).forEach(n => revealCell(n.r, n.c));
            }
        }

        function chord(r, c) {
            const cell = board[r][c];
            if (!cell.isRevealed || cell.neighborMines === 0) return;

            const neighbors = getNeighbors(r, c);
            const flagCount = neighbors.filter(n => board[n.r][n.c].isFlagged).length;

            if (flagCount === cell.neighborMines) {
                neighbors.forEach(n => {
                    if (!board[n.r][n.c].isRevealed && !board[n.r][n.c].isFlagged) {
                        handleCellClick(n.r, n.c);
                    }
                });
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                updateDisplay();
            }, 1000);
        }

        function checkWin() {
            const config = CONFIGS[currentDifficulty];
            if (revealedCount === (config.rows * config.cols) - config.mines) {
                gameOver(true);
            }
        }

        function gameOver(won) {
            isGameOver = true;
            clearInterval(timerInterval);
            resetBtn.innerText = won ? '★' : '×';
            resetBtn.style.backgroundColor = won ? '#4ade80' : '#f87171';

            minesLocations.forEach(loc => {
                const [r, c] = loc.split(',').map(Number);
                board[r][c].element.classList.add('revealed', 'mine');
            });

            setTimeout(() => showModal(won), 600);
        }

        function showModal(won) {
            document.getElementById('modal-icon').innerText = won ? '★' : '×';
            document.getElementById('modal-title').innerText = won ? 'VICTORY' : 'FAILED';
            document.getElementById('modal-msg').innerText = won ? `Field cleared in ${seconds}s.` : "A mine was triggered.";
            modal.classList.remove('hidden');
        }

        function closeModal() {
            modal.classList.add('hidden');
            resetBtn.style.backgroundColor = '#fde047';
            initGame();
        }

        resetBtn.addEventListener('click', initGame);
        window.onload = initGame;
    </script>
</body>
</html>
